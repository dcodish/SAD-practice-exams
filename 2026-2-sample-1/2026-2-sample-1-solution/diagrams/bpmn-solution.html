חברת הניהול, נתיב: מפקח היציאה</div>","t9":"<strong>חשב החזר נטו</strong><div>מאגר: חברת הניהול, נתיב: מערכת הפיקדונות</div>","t10":"<strong>שלח הוראת תשלום לבנק</strong><div>מאגר: חברת הניהול, נתיב: מערכת הפיקדונות</div>","wait-2":"<strong>אירוע ביניים</strong><div>אישור הבנק התקבל</div>","t11":"<strong>עדכן סטטוס ושלח אישור</strong><div>מאגר: חברת הניהול, נתיב: מערכת הפיקדונות</div><div>כותב: מאגר הפיקדונות</div>","end-1":"<strong>אירוע סיום</strong><div>הפיקדון הוחזר</div>","ds1":"<strong>מאגר נתונים: מאגר הפיקדונות</strong><div>נקרא ע״י: שלוף פרטי חוזה ופיקדון</div><div>נכתב ע״י: סמן מימוש פיקדון ושלח הודעה, עדכן סטטוס ושלח אישור</div>"};
