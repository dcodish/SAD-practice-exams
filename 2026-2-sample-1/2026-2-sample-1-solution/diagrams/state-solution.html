<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>פתרון שאלה 8, תרשים מצבים (חוזה שכירות), קמפוס בית</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;600;700&family=Noto+Sans+Hebrew:wght@400;500;700;800&display=swap" rel="stylesheet">
<style>
  *{box-sizing:border-box;}
  html,body{margin:0;padding:0;background:#eef2f6;font-family:'Noto Sans Hebrew',sans-serif;color:#1e293b;}
  .header-bar{padding:14px 20px 6px 20px;}
  .header-bar h1{font-size:18px;margin:0 0 3px 0;}
  .header-bar p{font-size:12.5px;color:#64748b;margin:0;line-height:1.6;}
  .diagram-wrap{overflow:auto;padding:14px 20px 30px 20px;direction:ltr;}
  .diagram-wrap svg{display:block;background:#f8fafc;border-radius:10px;box-shadow:0 1px 3px rgba(0,0,0,.08);min-width:1480px;}
  .vp-export-btn{
    position:fixed;bottom:20px;right:20px;z-index:1000;
    background:#1e40af;color:#fff;border:none;border-radius:6px;
    padding:8px 16px;font-size:13px;cursor:pointer;font-family:'IBM Plex Mono',monospace;
  }
  .vp-export-btn:hover{background:#1e3a8a;}
</style>
</head>
<body>

  <div class="header-bar">
    <h1>פתרון שאלה 8, תרשים מצבים (חוזה שכירות), קמפוס בית</h1>
    <p>מסלול החיים של אובייקט RentalAgreement (חוזה שכירות): על־מצב "בתהליך אישור" המקבץ את תת־המצבים שלפני כניסה לתוקף, לולאת תיקון חוזרת (8.2), מעבר הפיך בין פעיל לבפיגור, ושתי דרכי סיום נבדלות (8.3): ביטול מול סיום טבעי.</p>
  </div>

  <div class="diagram-wrap">
  <svg id="diagram" viewBox="0 0 1480 1040" xmlns="http://www.w3.org/2000/svg">
    <defs>
      <marker id="arrow" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto"><polygon points="0 0, 10 3.5, 0 7" fill="#334155"/></marker>
      <marker id="arrow-green" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto"><polygon points="0 0, 10 3.5, 0 7" fill="#15803d"/></marker>
      <marker id="arrow-orange" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto"><polygon points="0 0, 10 3.5, 0 7" fill="#c2410c"/></marker>
      <marker id="arrow-red" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto"><polygon points="0 0, 10 3.5, 0 7" fill="#b91c1c"/></marker>
      <marker id="arrow-purple" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto"><polygon points="0 0, 10 3.5, 0 7" fill="#7c3aed"/></marker>
      <marker id="arrow-teal" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto"><polygon points="0 0, 10 3.5, 0 7" fill="#0891b2"/></marker>
      <filter id="shadow" x="-5%" y="-5%" width="110%" height="110%"><feDropShadow dx="0" dy="1" stdDeviation="2" flood-opacity="0.12"/></filter>
      <pattern id="dotgrid" width="24" height="24" patternUnits="userSpaceOnUse"><circle cx="1" cy="1" r="0.8" fill="#cbd5e1"/></pattern>
    </defs>

    <rect x="0" y="0" width="1480" height="1040" fill="#f8fafc"/>
    <rect x="0" y="0" width="1480" height="1040" fill="url(#dotgrid)"/>

    <!-- ================= COMPOSITE STATE: IN_APPROVAL ================= -->
    <g id="state-composite" filter="url(#shadow)">
      <rect x="95" y="120" width="615" height="470" rx="20" ry="20" fill="#f0f7ff" stroke="#2563eb" stroke-width="2" stroke-dasharray="8 4"/>
      <text x="114" y="146" font-size="10.5" font-style="italic" fill="#7c3aed" font-family="IBM Plex Mono">«composite»</text>
      <text x="114" y="170" font-size="15" font-weight="800" fill="#1e293b" font-family="Noto Sans Hebrew, sans-serif">בתהליך אישור</text>
      <line x1="105" y1="180" x2="700" y2="180" stroke="#3b82f6" stroke-width="1"/>
      <text x="114" y="199" font-size="10" font-style="italic" fill="#334155" font-family="IBM Plex Mono">entry / setStatus('IN_APPROVAL')</text>
      <line x1="105" y1="209" x2="700" y2="209" stroke="#94a3b8" stroke-width="1" stroke-dasharray="6 3"/>
    </g>

    <!-- internal initial pseudostate -->
    <circle cx="128" cy="267" r="8" fill="#1e293b"/>
    <path d="M 136 267 L 156 267" fill="none" stroke="#334155" stroke-width="1.8" marker-end="url(#arrow)"/>

    <!-- sub-state S1: DRAFT -->
    <g id="state-s1" filter="url(#shadow)">
      <rect x="160" y="238" width="185" height="58" rx="16" ry="16" fill="#ffffff" stroke="#3b82f6" stroke-width="2"/>
      <rect x="160" y="238" width="185" height="26" rx="16" ry="16" fill="#eef4ff"/>
      <rect x="160" y="252" width="185" height="12" fill="#eef4ff"/>
      <text x="252.5" y="256" text-anchor="middle" font-size="12.5" font-weight="700" fill="#1e293b" font-family="Noto Sans Hebrew, sans-serif">טיוטה</text>
      <line x1="160" y1="264" x2="345" y2="264" stroke="#3b82f6" stroke-width="1"/>
      <text x="170" y="283" font-size="9" font-style="italic" fill="#334155" font-family="IBM Plex Mono">entry / setStatus('DRAFT')</text>
    </g>

    <!-- sub-state S2: AWAITING_SIGNATURE -->
    <g id="state-s2" filter="url(#shadow)">
      <rect x="445" y="230" width="222" height="58" rx="16" ry="16" fill="#ffffff" stroke="#3b82f6" stroke-width="2"/>
      <rect x="445" y="230" width="222" height="26" rx="16" ry="16" fill="#eef4ff"/>
      <rect x="445" y="244" width="222" height="12" fill="#eef4ff"/>
      <text x="556" y="248" text-anchor="middle" font-size="11.5" font-weight="700" fill="#1e293b" font-family="Noto Sans Hebrew, sans-serif">ממתין לחתימת הסטודנט</text>
      <line x1="445" y1="256" x2="667" y2="256" stroke="#3b82f6" stroke-width="1"/>
      <text x="455" y="275" font-size="8.6" font-style="italic" fill="#334155" font-family="IBM Plex Mono">entry / setStatus('AWAITING_SIGNATURE')</text>
    </g>

    <!-- sub-state S3: AWAITING_APPROVAL -->
    <g id="state-s3" filter="url(#shadow)">
      <rect x="445" y="452" width="230" height="58" rx="16" ry="16" fill="#ffffff" stroke="#3b82f6" stroke-width="2"/>
      <rect x="445" y="452" width="230" height="26" rx="16" ry="16" fill="#eef4ff"/>
      <rect x="445" y="466" width="230" height="12" fill="#eef4ff"/>
      <text x="560" y="470" text-anchor="middle" font-size="11.5" font-weight="700" fill="#1e293b" font-family="Noto Sans Hebrew, sans-serif">ממתין לאישור מנהל האזור</text>
      <line x1="445" y1="478" x2="675" y2="478" stroke="#3b82f6" stroke-width="1"/>
      <text x="455" y="497" font-size="8.6" font-style="italic" fill="#334155" font-family="IBM Plex Mono">entry / setStatus('AWAITING_APPROVAL')</text>
    </g>

    <!-- sub-state S4: RETURNED_FOR_CORRECTION -->
    <g id="state-s4" filter="url(#shadow)">
      <rect x="150" y="452" width="240" height="58" rx="16" ry="16" fill="#fff7ed" stroke="#c2410c" stroke-width="2"/>
      <rect x="150" y="452" width="240" height="26" rx="16" ry="16" fill="#ffedd5"/>
      <rect x="150" y="466" width="240" height="12" fill="#ffedd5"/>
      <text x="270" y="470" text-anchor="middle" font-size="12" font-weight="700" fill="#7c2d12" font-family="Noto Sans Hebrew, sans-serif">הוחזר לתיקון</text>
      <line x1="150" y1="478" x2="390" y2="478" stroke="#c2410c" stroke-width="1"/>
      <text x="160" y="497" font-size="7.8" font-style="italic" fill="#7c2d12" font-family="IBM Plex Mono">entry / setStatus('RETURNED_FOR_CORRECTION')</text>
    </g>

    <!-- ===== internal transitions (the correction cycle) ===== -->
    <!-- S1 -> S2 -->
    <path d="M 345 262 L 443 262" fill="none" stroke="#334155" stroke-width="1.8" marker-end="url(#arrow)"/>
    <g font-family="IBM Plex Mono" font-size="9.5">
      <rect x="348" y="235" width="94" height="14" fill="white" opacity="0.92" rx="3"/>
      <text x="395" y="245" text-anchor="middle" fill="#334155">שליחה לחתימה</text>
      <rect x="358" y="270" width="76" height="13" fill="white" opacity="0.92" rx="3"/>
      <text x="396" y="280" text-anchor="middle" font-size="8.6" fill="#0891b2">[רכז השיבוץ]</text>
    </g>

    <!-- S2 -> S3 (down) -->
    <path d="M 556 288 L 556 450" fill="none" stroke="#334155" stroke-width="1.8" marker-end="url(#arrow)"/>
    <g font-family="IBM Plex Mono" font-size="9.5">
      <rect x="562" y="352" width="86" height="14" fill="white" opacity="0.95" rx="3"/>
      <text x="605" y="362" text-anchor="middle" fill="#334155">הסטודנט חתם</text>
      <rect x="562" y="368" width="112" height="13" fill="white" opacity="0.95" rx="3"/>
      <text x="618" y="378" text-anchor="middle" font-size="8.6" fill="#15803d" style="direction:ltr;unicode-bidi:isolate">/ notifyManager</text>
    </g>

    <!-- S3 -> S4 (left), correction -->
    <path d="M 445 481 L 392 481" fill="none" stroke="#c2410c" stroke-width="1.9" marker-end="url(#arrow-orange)"/>
    <g font-family="IBM Plex Mono" font-size="9.5">
      <rect x="300" y="420" width="240" height="14" fill="white" opacity="0.95" rx="3"/>
      <text x="420" y="430" text-anchor="middle" fill="#c2410c">מנהל האזור החזיר לתיקון</text>
      <rect x="352" y="436" width="86" height="13" fill="white" opacity="0.95" rx="3"/>
      <text x="395" y="446" text-anchor="middle" font-size="8.6" fill="#0891b2">[נמצא ליקוי]</text>
    </g>

    <!-- S4 -> S1 (up, leftward back-arc), the correction LOOP -->
    <path d="M 250 452 L 250 298" fill="none" stroke="#c2410c" stroke-width="2" marker-end="url(#arrow-orange)"/>
    <g font-family="IBM Plex Mono" font-size="9.3">
      <rect x="253" y="358" width="196" height="14" fill="white" opacity="0.95" rx="3"/>
      <text x="352" y="368" text-anchor="start" fill="#c2410c">רכז השיבוץ תיקן והגיש מחדש</text>
      <rect x="253" y="374" width="150" height="13" fill="white" opacity="0.9" rx="3"/>
      <text x="257" y="384" text-anchor="start" font-size="8.4" font-style="italic" fill="#64748b">↺ לולאת תיקון, חוזרת</text>
    </g>

    <!-- ================= TOP-LEVEL INITIAL ================= -->
    <circle cx="400" cy="80" r="8" fill="#1e293b"/>
    <path d="M 400 88 L 400 118" fill="none" stroke="#334155" stroke-width="1.8" marker-end="url(#arrow)"/>

    <!-- ================= ACTIVE ================= -->
    <g id="state-active" filter="url(#shadow)">
      <rect x="830" y="150" width="225" height="96" rx="18" ry="18" fill="#ffffff" stroke="#3b82f6" stroke-width="2"/>
      <rect x="830" y="150" width="225" height="27" rx="18" ry="18" fill="#eef4ff"/>
      <rect x="830" y="165" width="225" height="12" fill="#eef4ff"/>
      <text x="942.5" y="169" text-anchor="middle" font-size="14" font-weight="700" fill="#1e293b" font-family="Noto Sans Hebrew, sans-serif">פעיל</text>
      <line x1="830" y1="177" x2="1055" y2="177" stroke="#3b82f6" stroke-width="1"/>
      <text x="840" y="196" font-size="9.3" font-style="italic" fill="#334155" font-family="IBM Plex Mono">entry / setStatus('ACTIVE')</text>
      <text x="840" y="212" font-size="9.3" font-style="italic" fill="#334155" font-family="IBM Plex Mono">do / generateMonthlyCharge()</text>
      <text x="840" y="228" font-size="9.3" font-style="italic" fill="#334155" font-family="IBM Plex Mono">do / checkEndDateReached()</text>
    </g>

    <!-- ================= IN_ARREARS ================= -->
    <g id="state-arrears" filter="url(#shadow)">
      <rect x="830" y="430" width="225" height="100" rx="18" ry="18" fill="#fef2f2" stroke="#b91c1c" stroke-width="2"/>
      <rect x="830" y="430" width="225" height="27" rx="18" ry="18" fill="#fee2e2"/>
      <rect x="830" y="445" width="225" height="12" fill="#fee2e2"/>
      <text x="942.5" y="449" text-anchor="middle" font-size="14" font-weight="700" fill="#7f1d1d" font-family="Noto Sans Hebrew, sans-serif">בפיגור</text>
      <line x1="830" y1="457" x2="1055" y2="457" stroke="#b91c1c" stroke-width="1"/>
      <text x="840" y="476" font-size="9.3" font-style="italic" fill="#7f1d1d" font-family="IBM Plex Mono">entry / setStatus('IN_ARREARS')</text>
      <text x="840" y="492" font-size="9.3" font-style="italic" fill="#7f1d1d" font-family="IBM Plex Mono">do / awaitDebtSettlement()</text>
      <text x="840" y="508" font-size="9.3" font-style="italic" fill="#7f1d1d" font-family="IBM Plex Mono">exit / unblockTenant()</text>
    </g>

    <!-- ================= ENDED ================= -->
    <g id="state-ended" filter="url(#shadow)">
      <rect x="1180" y="300" width="210" height="80" rx="18" ry="18" fill="#faf5ff" stroke="#7c3aed" stroke-width="2"/>
      <rect x="1180" y="300" width="210" height="27" rx="18" ry="18" fill="#f3e8ff"/>
      <rect x="1180" y="315" width="210" height="12" fill="#f3e8ff"/>
      <text x="1285" y="319" text-anchor="middle" font-size="14" font-weight="700" fill="#4c1d95" font-family="Noto Sans Hebrew, sans-serif">הסתיים</text>
      <line x1="1180" y1="327" x2="1390" y2="327" stroke="#7c3aed" stroke-width="1"/>
      <text x="1190" y="346" font-size="9.3" font-style="italic" fill="#4c1d95" font-family="IBM Plex Mono">entry / setStatus('ENDED')</text>
      <text x="1190" y="362" font-size="9.3" font-style="italic" fill="#4c1d95" font-family="IBM Plex Mono">do / keepForReporting()</text>
    </g>

    <!-- ================= CANCELLED ================= -->
    <g id="state-cancelled" filter="url(#shadow)">
      <rect x="430" y="690" width="205" height="80" rx="18" ry="18" fill="#fef2f2" stroke="#b91c1c" stroke-width="2"/>
      <rect x="430" y="690" width="205" height="27" rx="18" ry="18" fill="#fee2e2"/>
      <rect x="430" y="705" width="205" height="12" fill="#fee2e2"/>
      <text x="532.5" y="709" text-anchor="middle" font-size="14" font-weight="700" fill="#7f1d1d" font-family="Noto Sans Hebrew, sans-serif">בוטל</text>
      <line x1="430" y1="717" x2="635" y2="717" stroke="#b91c1c" stroke-width="1"/>
      <text x="440" y="736" font-size="9.3" font-style="italic" fill="#7f1d1d" font-family="IBM Plex Mono">entry / setStatus('CANCELLED')</text>
      <text x="440" y="752" font-size="9.3" font-style="italic" fill="#7f1d1d" font-family="IBM Plex Mono">do / keepForReporting()</text>
    </g>

    <!-- ================= FINAL PSEUDOSTATE ================= -->
    <circle cx="1285" cy="640" r="12" fill="none" stroke="#1e293b" stroke-width="2"/>
    <circle cx="1285" cy="640" r="7" fill="#1e293b"/>

    <!-- ===== composite border -> ACTIVE : approval (fires from S3) ===== -->
    <path d="M 710 400 L 775 400 L 775 210 L 828 210" fill="none" stroke="#15803d" stroke-width="2" marker-end="url(#arrow-green)"/>
    <g font-family="IBM Plex Mono" font-size="9.5">
      <rect x="640" y="292" width="212" height="14" fill="white" opacity="0.95" rx="3"/>
      <text x="746" y="302" text-anchor="middle" fill="#15803d">מנהל האזור אישר את החוזה</text>
      <rect x="700" y="308" width="150" height="13" fill="white" opacity="0.9" rx="3"/>
      <text x="775" y="318" text-anchor="middle" font-size="8.4" font-style="italic" fill="#64748b">(יוצא מגבול העל־מצב, מ־S3)</text>
    </g>

    <!-- ===== composite border -> CANCELLED : ביטול [טרם נכנס לתוקף] ===== -->
    <path d="M 450 590 L 450 655 L 532 655 L 532 688" fill="none" stroke="#b91c1c" stroke-width="2.2" marker-end="url(#arrow-red)"/>
    <g font-family="IBM Plex Mono" font-size="10">
      <rect x="300" y="600" width="150" height="15" fill="white" opacity="0.95" rx="3"/>
      <text x="375" y="611" text-anchor="middle" fill="#b91c1c">ביטול</text>
      <rect x="286" y="617" width="178" height="13" fill="white" opacity="0.95" rx="3"/>
      <text x="375" y="627" text-anchor="middle" font-size="8.8" fill="#0891b2">[טרם נכנס לתוקף]</text>
      <rect x="270" y="632" width="240" height="13" fill="white" opacity="0.9" rx="3"/>
      <text x="390" y="642" text-anchor="middle" font-size="8.4" font-style="italic" fill="#64748b">חל על כל תת־מצב טרום־תוקף כאחד</text>
    </g>

    <!-- ===== ACTIVE -> IN_ARREARS ===== -->
    <path d="M 880 246 L 880 428" fill="none" stroke="#334155" stroke-width="1.8" marker-end="url(#arrow)"/>
    <g font-family="IBM Plex Mono" font-size="9.2">
      <rect x="716" y="352" width="164" height="14" fill="white" opacity="0.95" rx="3"/>
      <text x="798" y="362" text-anchor="middle" fill="#334155">חלפו 10 ימים ללא פירעון החיוב</text>
      <rect x="792" y="368" width="86" height="13" fill="white" opacity="0.9" rx="3"/>
      <text x="835" y="378" text-anchor="middle" font-size="8.4" fill="#0891b2">[אירוע זמן]</text>
    </g>

    <!-- ===== IN_ARREARS -> ACTIVE : החוב נפרע (reversible loop) ===== -->
    <path d="M 1000 428 L 1000 246" fill="none" stroke="#0891b2" stroke-width="1.8" marker-end="url(#arrow-teal)"/>
    <g font-family="IBM Plex Mono" font-size="9.5">
      <rect x="1006" y="322" width="84" height="14" fill="white" opacity="0.95" rx="3"/>
      <text x="1048" y="332" text-anchor="middle" fill="#0891b2">החוב נפרע</text>
      <rect x="1006" y="338" width="120" height="13" fill="white" opacity="0.9" rx="3"/>
      <text x="1010" y="348" text-anchor="start" font-size="8.4" fill="#0891b2">[מערכת סליקה]</text>
    </g>

    <!-- ===== ACTIVE -> ENDED : natural end (time) ===== -->
    <path d="M 1055 200 L 1120 200 L 1120 328 L 1178 328" fill="none" stroke="#7c3aed" stroke-width="2" marker-end="url(#arrow-purple)"/>
    <g font-family="IBM Plex Mono" font-size="9.2">
      <rect x="1058" y="238" width="152" height="14" fill="white" opacity="0.95" rx="3"/>
      <text x="1134" y="248" text-anchor="middle" fill="#7c3aed">הגיע תאריך סיום השכירות</text>
      <rect x="1094" y="254" width="80" height="13" fill="white" opacity="0.9" rx="3"/>
      <text x="1134" y="264" text-anchor="middle" font-size="8.4" fill="#0891b2">[אירוע זמן]</text>
    </g>

    <!-- ===== IN_ARREARS -> ENDED : natural end (time) ===== -->
    <path d="M 1055 470 L 1120 470 L 1120 360 L 1178 360" fill="none" stroke="#7c3aed" stroke-width="2" marker-end="url(#arrow-purple)"/>
    <g font-family="IBM Plex Mono" font-size="9.2">
      <rect x="1058" y="474" width="152" height="14" fill="white" opacity="0.95" rx="3"/>
      <text x="1134" y="484" text-anchor="middle" fill="#7c3aed">הגיע תאריך סיום השכירות</text>
      <rect x="1094" y="490" width="80" height="13" fill="white" opacity="0.9" rx="3"/>
      <text x="1134" y="500" text-anchor="middle" font-size="8.4" fill="#0891b2">[אירוע זמן]</text>
    </g>

    <!-- ===== ENDED -> FINAL ===== -->
    <path d="M 1285 380 L 1285 626" fill="none" stroke="#334155" stroke-width="1.8" marker-end="url(#arrow)"/>
    <g font-family="IBM Plex Mono" font-size="9.2">
      <rect x="1180" y="532" width="210" height="14" fill="white" opacity="0.95" rx="3"/>
      <text x="1285" y="542" text-anchor="middle" fill="#334155">רשומת הסיום נשמרה לדיווח</text>
      <rect x="1210" y="548" width="150" height="13" fill="white" opacity="0.9" rx="3"/>
      <text x="1285" y="558" text-anchor="middle" font-size="8.4" fill="#15803d" style="direction:ltr;unicode-bidi:isolate">/ archiveRecord()</text>
    </g>

    <!-- ===== CANCELLED -> FINAL ===== -->
    <path d="M 635 730 L 1215 730 L 1215 648 L 1271 641" fill="none" stroke="#334155" stroke-width="1.8" marker-end="url(#arrow)"/>
    <g font-family="IBM Plex Mono" font-size="9.2">
      <rect x="790" y="708" width="210" height="14" fill="white" opacity="0.95" rx="3"/>
      <text x="895" y="718" text-anchor="middle" fill="#334155">רשומת הביטול נשמרה לדיווח</text>
      <rect x="820" y="724" width="150" height="13" fill="white" opacity="0.9" rx="3"/>

function xmlEscape(s) {
  return String(s ?? '')
    .replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;')
    .replace(/"/g, '&quot;').replace(/'/g, '&apos;');
}

function downloadFile(filename, mimeType, content) {
  const blob = new Blob([content], { type: mimeType });
  const url  = URL.createObjectURL(blob);
  const a    = Object.assign(document.createElement('a'), { href: url, download: filename });
  document.body.appendChild(a);
  a.click();
  setTimeout(() => { URL.revokeObjectURL(url); a.remove(); }, 1000);
}

function xmiBody(elements, rels) {
  const lines = [];
  lines.push(`    <packagedElement xmi:type="uml:StateMachine" xmi:id="sm_1" name="${xmlEscape(diagramModel.title)}">`);
  lines.push(`      <region xmi:type="uml:Region" xmi:id="region_1">`);
  function emitVertex(el, indent) {
    if (el.kind === 'pseudostate') {
      lines.push(`${indent}<subvertex xmi:type="uml:Pseudostate" xmi:id="${el.id}" kind="${el.subKind}"/>`);
    } else if (el.kind === 'state') {
      const hasSub = el.subElements && el.subElements.length;
      const head = `${indent}<subvertex xmi:type="uml:State" xmi:id="${el.id}" name="${xmlEscape(el.name)}"`;
      if (hasSub) {
        lines.push(head + `>`);
        lines.push(`${indent}  <region xmi:type="uml:Region" xmi:id="${el.id}_region">`);
        el.subElements.forEach(se => emitVertex(se, indent + '    '));
        lines.push(`${indent}  </region>`);
        lines.push(`${indent}</subvertex>`);
      } else {
        lines.push(head + `/>`);
      }
    }
  }
  elements.forEach(el => emitVertex(el, '        '));
  for (const r of rels) {
    if (r.kind === 'transition') {
      const nm = [r.event, r.guard ? `[${r.guard}]` : '', r.action ? `/ ${r.action}` : '']
                 .filter(Boolean).join(' ');
      lines.push(`        <transition xmi:type="uml:Transition" xmi:id="${r.id}" source="${r.from}" target="${r.to}"${nm ? ` name="${xmlEscape(nm)}"` : ''}/>`);
    }
  }
  lines.push(`      </region>`);
  lines.push(`    </packagedElement>`);
  return lines.join('\n');
}

function exportXMI() {
  const m = diagramModel;
  const title = xmlEscape(m.title || 'diagram');
  const allElements = m.parts.flatMap(p => p.elements);
  const allRelationships = m.parts.flatMap(p => p.relationships);
  const body = xmiBody(allElements, allRelationships);
  const xmi = `<?xml version="1.0" encoding="UTF-8"?>
<xmi:XMI xmi:version="2.1"
  xmlns:xmi="http://www.omg.org/XMI"
  xmlns:uml="http://www.eclipse.org/uml2/5.0.0/UML">
  <uml:Model xmi:id="model_1" name="${title}">
${body}
  </uml:Model>
</xmi:XMI>`;
  downloadFile(title.replace(/\s+/g, '_') + '.xmi', 'application/xml', xmi);
}
