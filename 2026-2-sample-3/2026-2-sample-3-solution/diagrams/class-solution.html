<!DOCTYPE html>
<html lang="he">
<head>
  <meta charset="UTF-8">
  <title>תרשים מחלקות, "ספר פתוח" (רשת השאלת ספריות)</title>
  <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;700&display=swap" rel="stylesheet">
  <style>
    body { margin: 0; background: #f1f5f9; font-family: 'IBM Plex Mono', monospace; }
    .tab-bar { display: flex; gap: 4px; padding: 8px; background: #e2e8f0; }
    .tab-btn { padding: 4px 12px; border: 1px solid #cbd5e1; background: white; cursor: pointer; border-radius: 4px; }
    .tab-btn.active { background: #1e40af; color: white; }
    .split-rationale { font-size: 11px; color: #64748b; padding: 4px 8px; }
    svg { display: block; }
    .vp-export-btn {
      position: fixed; bottom: 20px; right: 20px; z-index: 1000;
      background: #1e40af; color: #fff; border: none; border-radius: 6px;
      padding: 8px 16px; font-size: 13px; cursor: pointer;
      font-family: 'IBM Plex Mono', monospace;
    }
    .vp-export-btn:hover { background: #1e3a8a; }
  </style>
</head>
<body>

  <!-- SVG target; JS populates it -->
  <svg id="diagram-svg" xmlns="http://www.w3.org/2000/svg"></svg>

  <!-- VP export button (from export-buttons.md) -->
  <button class="vp-export-btn" onclick="exportXMI()">Download .xmi (Visual Paradigm)</button>

  <script>
  /* ============================================================
     1. DATA, CLASSES (§9b)
     ============================================================ */
  const CLASSES = [
    // ── Domain classes ──
    {
      id: 'Branch', name: 'Branch', stereotype: null, isEnum: false, isAbstract: false,
      attrs: ['+ name : String', '+ address : String', '+ phone : String'],
      ops: [],
      x: 60, y: 60
    },
    {
      id: 'Title', name: 'Title', stereotype: null, isEnum: false, isAbstract: false,
      attrs: ['+ name : String', '+ author : String', '+ isbn : String',
              '+ publicationYear : Integer', '+ category : TitleCategory'],
      ops: [],
      x: 320, y: 60
    },
    {
      id: 'AcquisitionOrder', name: 'AcquisitionOrder', stereotype: null, isEnum: false, isAbstract: false,
      attrs: ['+ orderDate : Date', '+ quantity : Integer', '+ supplierName : String'],
      ops: [],
      x: 620, y: 60
    },
    {
      id: 'MembershipType', name: 'MembershipType', stereotype: null, isEnum: false, isAbstract: false,
      attrs: ['+ maxActiveLoans : Integer', '+ loanPeriodDays : Integer',
              '+ maxRenewals : Integer', '+ dailyFineRate : Number'],
      ops: [],
      x: 60, y: 340
    },
    {
      id: 'Copy', name: 'Copy', stereotype: null, isEnum: false, isAbstract: false,
      attrs: ['+ barcode : String', '+ shelfLocation : String', '+ status : CopyStatus'],
      ops: [],
      x: 360, y: 340
    },
    {
      id: 'Patron', name: 'Patron', stereotype: null, isEnum: false, isAbstract: false,
      attrs: ['+ name : String', '+ contactInfo : String'],
      ops: [],
      x: 690, y: 340
    },
    {
      id: 'Loan', name: 'Loan', stereotype: '«association class»', isEnum: false, isAbstract: false,
      attrs: ['+ checkoutDate : Date', '+ dueDate : Date', '+ returnDate : Date',
              '+ renewalsCount : Integer', '+ status : LoanStatus'],
      ops: ['+ checkout()', '+ renew()', '+ markOverdue()',
            '+ returnCopy()', '+ markLost()', '+ calculateFine()'],
      x: 512, y: 478
    },
    {
      id: 'Fine', name: 'Fine', stereotype: null, isEnum: false, isAbstract: false,
      attrs: ['+ amount : Number', '+ reason : String', '+ status : FineStatus'],
      ops: [],
      x: 535, y: 780
    },

    // ── Enumerations (unconnected, placed near their using class) ──
    {
      id: 'TitleCategory', name: 'TitleCategory', stereotype: '«enumeration»', isEnum: true, isAbstract: false,
      attrs: ['Reference', 'Fiction', 'Children', 'ReferenceOnly'],
      ops: [],
      x: 900, y: 60
    },
    {
      id: 'CopyStatus', name: 'CopyStatus', stereotype: '«enumeration»', isEnum: true, isAbstract: false,
      attrs: ['Available', 'OnLoan', 'Reserved', 'InRepair', 'Lost'],
      ops: [],
      x: 900, y: 200
    },
    {
      id: 'LoanStatus', name: 'LoanStatus', stereotype: '«enumeration»', isEnum: true, isAbstract: false,
      attrs: ['Reserved', 'Active', 'Overdue', 'ReturnedOnTime', 'ReturnedLate', 'Lost', 'Expired'],
      ops: [],
      x: 900, y: 360
    },
    {
      id: 'FineStatus', name: 'FineStatus', stereotype: '«enumeration»', isEnum: true, isAbstract: false,
      attrs: ['Open', 'Paid', 'Waived'],
      ops: [],
      x: 900, y: 560
    }
  ];

  /* ============================================================
     2. DATA, RELS (§9c)
     ============================================================ */
  const RELS = [
    // Composition: Title (whole ◆), Copy
    {
      type: 'comp', from: 'Title', to: 'Copy',
      fromMult: '1', toMult: '1..*', fromRole: null, toRole: null, label: null,
      points: [[416, 170], [416, 340]]
    },
    // Association: Title, AcquisitionOrder (orders)
    {
      type: 'assoc', from: 'Title', to: 'AcquisitionOrder',
      fromMult: '1', toMult: '0..*', fromRole: null, toRole: 'orders', label: 'orders',
      points: [[512, 101], [566, 101], [620, 101]]
    },
    // Aggregation: Branch (whole ◇), Copy, copies SURVIVE branch closure (moved elsewhere)
    {
      type: 'agg', from: 'Branch', to: 'Copy',
      fromMult: '1', toMult: '0..*', fromRole: null, toRole: 'stocks', label: 'stocks',
      points: [[193, 120], [300, 120], [300, 390], [360, 390]]
    },
    // Association: Branch, Patron (home branch)
    {
      type: 'assoc', from: 'Branch', to: 'Patron',
      fromMult: '1', toMult: '0..*', fromRole: null, toRole: 'home branch', label: 'home branch',
      points: [[126, 142], [126, 250], [769, 250], [769, 340]]
    },
    // Association: MembershipType, Patron (governs)
    {
      type: 'assoc', from: 'MembershipType', to: 'Patron',
      fromMult: '1', toMult: '0..*', fromRole: null, toRole: 'governs', label: 'governs',
      points: [[152, 436], [152, 455], [769, 455], [769, 408]]
    },
    // Association (many-to-many base carrying the Loan association class)
    {
      id: 'assoc_patron_copy', type: 'assoc', from: 'Patron', to: 'Copy',
      fromMult: '0..*', toMult: '0..*', fromRole: null, toRole: null, label: 'borrows',
      points: [[690, 372], [611, 372], [532, 372]]
    },
    // Association class tether: Loan ⇢ midpoint of Patron-Copy
    {
      type: 'assocClass', from: 'Loan', baseId: 'assoc_patron_copy'
    },
    // Association: Loan, Fine (incurs)
    {
      type: 'assoc', from: 'Loan', to: 'Fine',
      fromMult: '1', toMult: '0..1', fromRole: null, toRole: 'incurs', label: 'incurs',
      points: [[611, 697], [611, 738], [611, 780]]
    }
  ];

  /* ============================================================
     3. ENGINE (§9d, verbatim, plus minimal assocClass support)
     ============================================================ */
  // ── Constants ─────────────────────────────────────────────────────────────
  const HDR_H = 28, PAD = 6, LINE_H = 14, DIV_H = 1;
  const FM = 'font-family="IBM Plex Mono, monospace"';

  function escXml(s) {
    return String(s)
      .replace(/&/g, '&amp;').replace(/</g, '&lt;')
      .replace(/>/g, '&gt;').replace(/"/g, '&quot;');
  }

  function boxH(cls) {
    const hdrH = cls.stereotype ? 38 : HDR_H;
    return hdrH + PAD + cls.attrs.length * LINE_H +
      (cls.ops.length > 0 ? DIV_H + cls.ops.length * LINE_H : 0) + PAD;
  }

  function boxW(cls) {
    const longest = [...cls.attrs, ...cls.ops, cls.name]
      .reduce((m, s) => Math.max(m, s.length), 0);
    return Math.max(120, Math.ceil(longest * 6.5) + 16);
  }

  function svgBox(cls) {
    const w = boxW(cls), h = boxH(cls), { x, y } = cls;
    const hdrH = cls.stereotype ? 38 : HDR_H;
    const border   = cls.isEnum ? '#94a3b8' : '#3b82f6';
    const hdrFill  = cls.isEnum ? '#475569' : '#1e40af';
    const bodyFill = cls.isEnum ? '#f8fafc' : 'white';
    const dash     = cls.isEnum ? 'stroke-dasharray="5 3"' : '';

    let s = `<rect x="${x}" y="${y}" width="${w}" height="${h}" fill="${bodyFill}" stroke="${border}" stroke-width="2" ${dash} rx="2"/>`;
    s += `<rect x="${x}" y="${y}" width="${w}" height="${hdrH}" fill="${hdrFill}" rx="2"/>`;

    if (cls.stereotype) {
      s += `<text x="${x + w/2}" y="${y + 13}" text-anchor="middle" fill="white" font-size="9" ${FM}>${escXml(cls.stereotype)}</text>`;
    }
    const nameStyle = cls.isAbstract ? 'font-style:italic' : '';
    const nameY = cls.stereotype ? y + hdrH - 8 : y + hdrH / 2 + 4;
    s += `<text x="${x + w/2}" y="${nameY}" text-anchor="middle" fill="white" font-size="11" font-weight="700" ${FM} style="${nameStyle}">${escXml(cls.name)}</text>`;

    const divY = y + hdrH;
    s += `<line x1="${x}" y1="${divY}" x2="${x + w}" y2="${divY}" stroke="${border}" stroke-width="1"/>`;

    let curY = divY + PAD + 10;
    for (const a of cls.attrs) {
      s += `<text x="${x + 6}" y="${curY}" text-anchor="start" fill="#1e293b" font-size="10.5" ${FM}>${escXml(a)}</text>`;
      curY += LINE_H;
    }
    if (cls.ops.length > 0) {
      const opDivY = divY + PAD + cls.attrs.length * LINE_H;
      s += `<line x1="${x}" y1="${opDivY}" x2="${x + w}" y2="${opDivY}" stroke="${border}" stroke-width="1"/>`;
      curY = opDivY + PAD + 10;
      for (const o of cls.ops) {
        s += `<text x="${x + 6}" y="${curY}" text-anchor="start" fill="#2563eb" font-size="10.5" font-style="italic" ${FM}>${escXml(o)}</text>`;
        curY += LINE_H;
      }
    }
    return s;
  }

  // Minimal helper for the association-class tether: nearest box-edge point
  // along the ray from the box center toward an external target (rect-boundary-intersect).
  function nearestEdge(cls, target) {
    const w = boxW(cls), h = boxH(cls);
    const cx = cls.x + w / 2, cy = cls.y + h / 2;
    const dx = target[0] - cx, dy = target[1] - cy;
    if (dx === 0 && dy === 0) return [cx, cy];
    const sx = (w / 2) / Math.abs(dx || 1e-9);
    const sy = (h / 2) / Math.abs(dy || 1e-9);
    const t = Math.min(sx, sy);
    return [cx + dx * t, cy + dy * t];
  }

  function svgRel(rel) {
    // Association-class tether: dashed perpendicular line from the Loan box edge
    // to the MIDPOINT of the base association polyline. No arrowhead, no mult labels.
    if (rel.type === 'assocClass') {
      const base = RELS.find(r => r.id === rel.baseId);
      const bp = base.points;
      const mid = bp[Math.floor(bp.length / 2)];
      const cls = CLASSES.find(c => c.id === rel.from);
      const e = nearestEdge(cls, mid);
      return `<polyline points="${e[0]},${e[1]} ${mid[0]},${mid[1]}" fill="none" stroke="#334155" stroke-width="1.4" stroke-dasharray="4 3"/>`;
    }

    const pts = rel.points.map(([px, py]) => `${px},${py}`).join(' ');
    let mS = '', mE = '', dash = '';
    if (rel.type === 'comp') mS = 'marker-start="url(#compFill)"';
    if (rel.type === 'agg')  mS = 'marker-start="url(#aggHollow)"';
    if (rel.type === 'gen')  mE = 'marker-end="url(#genHollow)"';
    if (rel.type === 'dep')  { mE = 'marker-end="url(#arrOpen)"'; dash = 'stroke-dasharray="6 3"'; }
    // 'assoc': no markers, plain line

    let s = `<polyline points="${pts}" fill="none" stroke="#334155" stroke-width="1.8" ${dash} ${mS} ${mE}/>`;
    // Multiplicity labels, placed just OUTSIDE each box, offset along the line
    // (away from the box) and beside it, so BOTH ends are always legible.
    const multLabel = (end, adj, txt) => {
      const dx = adj[0] - end[0], dy = adj[1] - end[1];
      const L = Math.hypot(dx, dy) || 1, ux = dx / L, uy = dy / L;
      const x = end[0] + ux * 16 - uy * 9, y = end[1] + uy * 16 + ux * 9 + 3;
      return `<text x="${x}" y="${y}" text-anchor="middle" fill="#64748b" font-size="9.5" ${FM}>${escXml(txt)}</text>`;
    };
    if (rel.fromMult) s += multLabel(rel.points[0], rel.points[1], rel.fromMult);
    if (rel.toMult) {
      const n = rel.points.length;
      s += multLabel(rel.points[n - 1], rel.points[n - 2], rel.toMult);
    }
    if (rel.label) {
      const mid = rel.points[Math.floor(rel.points.length / 2)];
      s += `<text x="${mid[0]}" y="${mid[1] - 6}" text-anchor="middle" fill="#64748b" font-size="9.5" ${FM}>${escXml(rel.label)}</text>`;
    }
    return s;
  }

  function render() {
    let maxX = 600, maxY = 400;
    for (const cls of CLASSES) {
      maxX = Math.max(maxX, cls.x + boxW(cls) + 60);
      maxY = Math.max(maxY, cls.y + boxH(cls) + 80);
    }

    const defs = `<defs>
      <pattern id="dotgrid" width="24" height="24" patternUnits="userSpaceOnUse">
        <circle cx="12" cy="12" r="0.8" fill="#cbd5e1"/>
      </pattern>
      <marker id="genHollow" markerWidth="12" markerHeight="10" refX="10" refY="5" orient="auto">
        <polygon points="0,0 10,5 0,10" fill="white" stroke="#334155" stroke-width="1.5"/>
      </marker>
      <marker id="arrOpen" markerWidth="10" markerHeight="8" refX="9" refY="4" orient="auto">
        <polyline points="0,0 9,4 0,8" fill="none" stroke="#334155" stroke-width="1.5"/>
      </marker>
      <marker id="compFill" markerWidth="14" markerHeight="10" refX="1" refY="5" orient="auto">
        <polygon points="0,5 7,0 14,5 7,10" fill="#1e40af" stroke="#1e40af"/>
      </marker>
      <marker id="aggHollow" markerWidth="14" markerHeight="10" refX="1" refY="5" orient="auto">
        <polygon points="0,5 7,0 14,5 7,10" fill="white" stroke="#334155"/>
      </marker>
    </defs>`;

    // totalWidth / totalHeight include margins and space for the legend.
    // RIGHT_MARGIN ≥ 40px, BOTTOM_MARGIN ≥ 70px (legend needs ~50px).
    // These are already baked into maxX / maxY from the loop above (60px / 80px).
    const totalWidth  = maxX;
    const totalHeight = maxY;   // legend drawn at totalHeight - 60, inside this height

    const bg    = `<rect width="${totalWidth}" height="${totalHeight}" fill="url(#dotgrid)"/>`;
    const rels  = RELS.map(svgRel).join('');
    const boxes = CLASSES.map(svgBox).join('');
    // Legend is placed at totalHeight - 60 so it always lands inside the viewBox.
    const legend = `<text x="16" y="${totalHeight - 60}" fill="#64748b" font-size="9" ${FM}>── Association  ◇── Aggregation  ◆── Composition  ──▷ Generalization  |  קרדינליות בשני קצות הקשר</text>`;

    const svg = document.getElementById('diagram-svg');
    svg.setAttribute('width',   totalWidth);
    svg.setAttribute('height',  totalHeight);
    svg.setAttribute('viewBox', `0 0 ${totalWidth} ${totalHeight}`);
    svg.innerHTML = defs + bg + rels + boxes + legend;
  }

  /* ============================================================
     4. diagramModel (§8 / model-shape.md, kind:'class')
     ============================================================ */
  function parseAttr(s) {
    const m = s.match(/^\s*([+\-#])\s*([^:]+?)\s*:\s*(.+?)\s*$/);
    if (m) return { visibility: m[1], name: m[2], type: m[3], defaultValue: null, constraint: null };
    // enum literal (no visibility / type)
    return { visibility: null, name: s.trim(), type: null, defaultValue: null, constraint: null };
  }
  function parseOp(s) {
    const m = s.match(/^\s*([+\-#])\s*([A-Za-z0-9_]+)\s*\(([^)]*)\)\s*(?::\s*(.+))?\s*$/);
    if (m) return { visibility: m[1], name: m[2], params: [], returnType: m[4] || null };
    return { visibility: '+', name: s.trim(), params: [], returnType: null };
  }

  const diagramModel = {
    kind: 'class',
    title: 'Class Diagram, Library Loan Network (ספר פתוח)',
    parts: [{
      id: 'part-1',
      label: 'Domain Model',
      splitRationale: '',
      elements: CLASSES.map(c => ({
        kind: 'class',
        id: c.id,
        name: c.name,
        isAbstract: !!c.isAbstract,
        stereotype: c.isEnum ? 'enumeration'
                  : (c.stereotype ? c.stereotype.replace(/[«»]/g, '').trim() : null),
        attributes: c.attrs.map(parseAttr),
        operations: c.ops.map(parseOp),
        x: c.x, y: c.y, w: boxW(c), h: boxH(c)
      })),
      relationships: [
        { kind: 'association', id: 'r_title_copy', from: 'Title', to: 'Copy',
          multFrom: '1', multTo: '1..*', roleFrom: null, roleTo: null,
          directed: false, aggregation: false, composition: true },
        { kind: 'association', id: 'r_title_order', from: 'Title', to: 'AcquisitionOrder',
          multFrom: '1', multTo: '0..*', roleFrom: null, roleTo: 'orders',
          directed: false, aggregation: false, composition: false },
        { kind: 'association', id: 'r_branch_copy', from: 'Branch', to: 'Copy',
          multFrom: '1', multTo: '0..*', roleFrom: null, roleTo: 'stocks',
          directed: false, aggregation: true, composition: false },
        { kind: 'association', id: 'r_branch_patron', from: 'Branch', to: 'Patron',
          multFrom: '1', multTo: '0..*', roleFrom: null, roleTo: 'home branch',
          directed: false, aggregation: false, composition: false },
        { kind: 'association', id: 'r_member_patron', from: 'MembershipType', to: 'Patron',
          multFrom: '1', multTo: '0..*', roleFrom: null, roleTo: 'governs',
          directed: false, aggregation: false, composition: false },
        { kind: 'association', id: 'assoc_patron_copy', from: 'Patron', to: 'Copy',
          multFrom: '0..*', multTo: '0..*', roleFrom: null, roleTo: null,
          directed: false, aggregation: false, composition: false },
        { kind: 'association', id: 'r_loan_fine', from: 'Loan', to: 'Fine',
          multFrom: '1', multTo: '0..1', roleFrom: null, roleTo: 'incurs',
          directed: false, aggregation: false, composition: false },
        { kind: 'associationClass', id: 'ac_loan', classId: 'Loan', assocId: 'assoc_patron_copy' }
      ]
    }]
  };

  /* ============================================================
     5. VP EXPORT (export-buttons.md, XMI 2.1, class xmiBody)
     ============================================================ */
  function xmlEscape(s) {
    return String(s ?? '')
      .replace(/&/g, '&amp;')
      .replace(/</g, '&lt;')
      .replace(/>/g, '&gt;')
      .replace(/"/g, '&quot;')
      .replace(/'/g, '&apos;');
  }

  function downloadFile(filename, mimeType, content) {
    const blob = new Blob([content], { type: mimeType });
    const url  = URL.createObjectURL(blob);
    const a    = Object.assign(document.createElement('a'),
                   { href: url, download: filename });
    document.body.appendChild(a);
    a.click();
    setTimeout(() => { URL.revokeObjectURL(url); a.remove(); }, 1000);
  }

  function xmiBody(elements, rels) {
    const lines = [];
    for (const el of elements) {
      if (el.kind === 'class') {
        const isEnum = el.stereotype === 'enumeration';
        const tag = isEnum ? 'uml:Enumeration' : 'uml:Class';
        lines.push(`    <packagedElement xmi:type="${tag}" xmi:id="${el.id}" name="${xmlEscape(el.name)}"${el.isAbstract ? ' isAbstract="true"' : ''}>`);
        if (isEnum) {
          for (const a of el.attributes)
            lines.push(`      <ownedLiteral xmi:id="${el.id}_${xmlEscape(a.name)}" name="${xmlEscape(a.name)}"/>`);
        } else {
          for (const a of el.attributes)
            lines.push(`      <ownedAttribute xmi:id="${el.id}_${xmlEscape(a.name)}" name="${xmlEscape(a.name)}" visibility="${a.visibility === '+' ? 'public' : a.visibility === '-' ? 'private' : 'protected'}"/>`);
          for (const op of el.operations)
            lines.push(`      <ownedOperation xmi:id="${el.id}_${xmlEscape(op.name)}" name="${xmlEscape(op.name)}"/>`);
        }
        lines.push(`    </packagedElement>`);
      }
    }
    for (const r of rels) {
      if (r.kind === 'generalization')
        lines.push(`    <packagedElement xmi:type="uml:Generalization" xmi:id="${r.id}" specific="${r.from}" general="${r.to}"/>`);
      if (r.kind === 'association')
        lines.push(`    <packagedElement xmi:type="uml:Association" xmi:id="${r.id}" memberEnd="${r.from}_end ${r.to}_end"/>`);
    }
    return lines.join('\n');
  }

  function exportXMI() {
    const m = diagramModel;
    const title = xmlEscape(m.title || 'diagram');
    const allElements = m.parts.flatMap(p => p.elements);
    const allRelationships = m.parts.flatMap(p => p.relationships);
    const body = xmiBody(allElements, allRelationships);

    const xmi = `<?xml version="1.0" encoding="UTF-8"?>
<xmi:XMI xmi:version="2.1"
  xmlns:xmi="http://www.omg.org/XMI"
  xmlns:uml="http://www.eclipse.org/uml2/5.0.0/UML">
  <uml:Model xmi:id="model_1" name="${title}">
${body}
  </uml:Model>
</xmi:XMI>`;

    downloadFile(title.replace(/\s+/g, '_') + '.xmi', 'application/xml', xmi);
  }
  // NOTE: Visual Paradigm auto-layouts on XMI import, coordinates are not preserved.

  document.addEventListener('DOMContentLoaded', render);
  </script>
</body>
</html>
