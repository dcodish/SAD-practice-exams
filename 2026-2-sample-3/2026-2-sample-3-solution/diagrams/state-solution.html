<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
<meta charset="UTF-8">
<title>השאלה (Loan), תרשים מצבים</title>
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;700&family=Noto+Sans+Hebrew:wght@400;700&display=swap" rel="stylesheet">
<style>
  body { background:#f8fafc; margin:0; padding:20px; font-family:'Noto Sans Hebrew','IBM Plex Mono',monospace; }
  h1 { font-size:18px; color:#1e293b; margin:0 0 4px; }
  .sub { font-size:12px; color:#64748b; margin:0 0 14px; }
  .svg-wrap { background:#f8fafc; border:1px solid #e2e8f0; border-radius:8px; overflow:auto; }
  svg { display:block; direction:ltr; }
  .vp-export-btn {
    position:fixed; bottom:20px; right:20px; z-index:1000;
    background:#1e40af; color:#fff; border:none; border-radius:6px;
    padding:8px 16px; font-size:13px; cursor:pointer;
    font-family:'IBM Plex Mono',monospace;
  }
  .vp-export-btn:hover { background:#1e3a8a; }
  [data-state] { cursor:pointer; }
  [data-state]:hover { filter: drop-shadow(0 2px 6px rgba(37,99,235,.55)); }
  #modal-overlay {
    position:fixed; inset:0; background:rgba(15,23,42,.5); z-index:2000;
    display:flex; align-items:center; justify-content:center; padding:24px;
  }
  #modal-overlay[hidden] { display:none; }
  #modal {
    background:#fff; border-radius:12px; max-width:600px; width:100%;
    max-height:82vh; overflow-y:auto; padding:22px 26px;
    box-shadow:0 20px 50px rgba(15,23,42,.35); position:relative;
    font-family:'Noto Sans Hebrew',sans-serif;
  }
  #modal h2 { margin:0 0 2px; font-size:18px; color:#1e293b; }
  #modal .status-const {
    font-family:'IBM Plex Mono',monospace; font-size:11px; color:#64748b;
    direction:ltr; display:inline-block; margin-bottom:10px;
  }
  #modal h3 { font-size:13px; color:#2563eb; margin:14px 0 4px; }
  #modal p, #modal li { font-size:13.5px; color:#334155; line-height:1.65; margin:0 0 6px; }
  #modal ul { margin:0; padding-right:18px; }
  #modal .teach {
    background:#f0f7ff; border-right:3px solid #2563eb; border-radius:6px;
    padding:10px 12px; margin-top:14px;
  }
  #modal .teach h3 { margin-top:0; }
  .modal-close {
    position:absolute; top:12px; left:12px; border:none; background:#f1f5f9;
    border-radius:6px; width:28px; height:28px; font-size:16px; cursor:pointer; color:#475569;
  }
  .modal-close:hover { background:#e2e8f0; }
</style>
</head>
<body>
<h1>השאלה (Loan), תרשים מצבים</h1>
<p class="sub">פתרון לדוגמה שאלה 8, מחזור החיים של אובייקט Loan במערכת "ספר פתוח" (רשת השאלת ספריות) &nbsp;|&nbsp; קורס 364-1-1411, מבחן לדוגמה סמסטר ב' 2026, מועד מיוחד &nbsp;|&nbsp; לחצו על כל מצב בתרשים לקבלת הסבר מפורט</p>

<div class="diagram-part" id="part-1">
<div class="svg-wrap">
<svg width="1320" height="1010" viewBox="0 0 1320 1010" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <pattern id="dotgrid" width="24" height="24" patternUnits="userSpaceOnUse">
      <circle cx="12" cy="12" r="0.8" fill="#cbd5e1"/>
    </pattern>
    <marker id="arrow" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#334155"/>
    </marker>
  </defs>
  <rect x="0" y="0" width="1320" height="1010" fill="url(#dotgrid)"/>

  <text x="24" y="30" font-size="12" fill="#94a3b8" font-family="'Noto Sans Hebrew',sans-serif">מחזור החיים של אובייקט Loan: ארבעה מצבי סיום עסקיים ← ארכיון (תפעולי או פיננסי) ← גריעה מהמערכת בתום תקופת השמירה</text>

  <!-- ============ states ============ -->
  <!-- מוזמנת (RESERVED) -->
  <g data-state="reserved">
    <title>מוזמנת, הזמנה הוצבה בתור לכותר שכל עותקיו מושאלים, לחץ להסבר</title>
    <rect x="165" y="165" width="225" height="105" rx="18" ry="18" fill="#ffffff" stroke="none"/>
    <path d="M 165 191 v -8 a18 18 0 0 1 18 -18 h 189 a18 18 0 0 1 18 18 v 8 z" fill="#eef4ff"/>
    <line x1="165" y1="191" x2="390" y2="191" stroke="#3b82f6" stroke-width="1"/>
    <rect x="165" y="165" width="225" height="105" rx="18" ry="18" fill="none" stroke="#3b82f6" stroke-width="2"/>
    <text x="277.5" y="183" font-size="12" font-weight="700" fill="#1e293b" text-anchor="middle" font-family="'Noto Sans Hebrew',sans-serif">מוזמנת</text>
    <text x="176" y="211" font-size="10" fill="#334155" font-family="'IBM Plex Mono',monospace">entry / setStatus('RESERVED');</text>
    <text x="176" y="227" font-size="10" fill="#334155" font-family="'IBM Plex Mono',monospace">        startHoldTimer(3d)</text>
    <text x="176" y="243" font-size="10" fill="#334155" font-family="'IBM Plex Mono',monospace">exit / stopHoldTimer()</text>
  </g>
  <!-- מושאלת (ACTIVE) -->
  <g data-state="active">
    <title>מושאלת, עותק הוקצה למנוי; ההשאלה פעילה עד תאריך היעד, לחץ להסבר</title>
    <rect x="545" y="165" width="225" height="105" rx="18" ry="18" fill="#ffffff" stroke="none"/>
    <path d="M 545 191 v -8 a18 18 0 0 1 18 -18 h 189 a18 18 0 0 1 18 18 v 8 z" fill="#eef4ff"/>
    <line x1="545" y1="191" x2="770" y2="191" stroke="#3b82f6" stroke-width="1"/>
    <rect x="545" y="165" width="225" height="105" rx="18" ry="18" fill="none" stroke="#3b82f6" stroke-width="2"/>
    <text x="657.5" y="183" font-size="12" font-weight="700" fill="#1e293b" text-anchor="middle" font-family="'Noto Sans Hebrew',sans-serif">מושאלת</text>
    <text x="556" y="211" font-size="10" fill="#334155" font-family="'IBM Plex Mono',monospace">entry / setStatus('ACTIVE');</text>
    <text x="556" y="227" font-size="10" fill="#334155" font-family="'IBM Plex Mono',monospace">        setDueDate(+period)</text>
    <text x="556" y="243" font-size="10" fill="#334155" font-family="'IBM Plex Mono',monospace">do / trackRenewals()</text>
  </g>
  <!-- באיחור (OVERDUE) -->
  <g data-state="overdue">
    <title>באיחור, חלף תאריך היעד והעותק טרם הוחזר, לחץ להסבר</title>
    <rect x="950" y="165" width="225" height="105" rx="18" ry="18" fill="#ffffff" stroke="none"/>
    <path d="M 950 191 v -8 a18 18 0 0 1 18 -18 h 189 a18 18 0 0 1 18 18 v 8 z" fill="#eef4ff"/>
    <line x1="950" y1="191" x2="1175" y2="191" stroke="#3b82f6" stroke-width="1"/>
    <rect x="950" y="165" width="225" height="105" rx="18" ry="18" fill="none" stroke="#3b82f6" stroke-width="2"/>
    <text x="1062.5" y="183" font-size="12" font-weight="700" fill="#1e293b" text-anchor="middle" font-family="'Noto Sans Hebrew',sans-serif">באיחור</text>
    <text x="961" y="211" font-size="10" fill="#334155" font-family="'IBM Plex Mono',monospace">entry / setStatus('OVERDUE');</text>
    <text x="961" y="227" font-size="10" fill="#334155" font-family="'IBM Plex Mono',monospace">        sendReminder()</text>
    <text x="961" y="243" font-size="10" fill="#334155" font-family="'IBM Plex Mono',monospace">do / accrueOverdueDays()</text>
  </g>

  <!-- ==== outcome states (row 2) ==== -->
  <!-- פקעה (EXPIRED) -->
  <g data-state="expired">
    <title>פקעה, ההזמנה לא נאספה בתוך שלושה ימים ופקעה מאליה, לחץ להסבר</title>
    <rect x="40" y="440" width="260" height="100" rx="18" ry="18" fill="#ffffff" stroke="none"/>
    <path d="M 40 466 v -8 a18 18 0 0 1 18 -18 h 224 a18 18 0 0 1 18 18 v 8 z" fill="#eef4ff"/>
    <line x1="40" y1="466" x2="300" y2="466" stroke="#3b82f6" stroke-width="1"/>
    <rect x="40" y="440" width="260" height="100" rx="18" ry="18" fill="none" stroke="#3b82f6" stroke-width="2"/>
    <text x="170" y="458" font-size="12" font-weight="700" fill="#1e293b" text-anchor="middle" font-family="'Noto Sans Hebrew',sans-serif">פקעה</text>
    <text x="51" y="486" font-size="10" fill="#334155" font-family="'IBM Plex Mono',monospace">entry / setStatus('EXPIRED');</text>
    <text x="51" y="502" font-size="10" fill="#334155" font-family="'IBM Plex Mono',monospace">        releaseToNextInQueue();</text>
    <text x="51" y="518" font-size="10" fill="#334155" font-family="'IBM Plex Mono',monospace">        setClosureReason('EXPIRED')</text>
  </g>
  <!-- הוחזרה בזמן (RETURNED_ON_TIME) -->
  <g data-state="returned_on_time">
    <title>הוחזרה בזמן, העותק הוחזר לפני תאריך היעד, לחץ להסבר</title>
    <rect x="370" y="440" width="260" height="100" rx="18" ry="18" fill="#ffffff" stroke="none"/>
    <path d="M 370 466 v -8 a18 18 0 0 1 18 -18 h 224 a18 18 0 0 1 18 18 v 8 z" fill="#eef4ff"/>
    <line x1="370" y1="466" x2="630" y2="466" stroke="#3b82f6" stroke-width="1"/>
    <rect x="370" y="440" width="260" height="100" rx="18" ry="18" fill="none" stroke="#3b82f6" stroke-width="2"/>
    <text x="500" y="458" font-size="12" font-weight="700" fill="#1e293b" text-anchor="middle" font-family="'Noto Sans Hebrew',sans-serif">הוחזרה בזמן</text>
    <text x="381" y="486" font-size="10" fill="#334155" font-family="'IBM Plex Mono',monospace">entry / setStatus('RETURNED_ON_TIME');</text>
    <text x="381" y="502" font-size="10" fill="#334155" font-family="'IBM Plex Mono',monospace">        setReturnDate(today);</text>
    <text x="381" y="518" font-size="10" fill="#334155" font-family="'IBM Plex Mono',monospace">        setClosureReason('ON_TIME')</text>
  </g>
  <!-- הוחזרה באיחור (RETURNED_LATE) -->
  <g data-state="returned_late">
    <title>הוחזרה באיחור, העותק הוחזר אחרי היעד; חושב קנס, לחץ להסבר</title>
    <rect x="700" y="440" width="260" height="100" rx="18" ry="18" fill="#ffffff" stroke="none"/>
    <path d="M 700 466 v -8 a18 18 0 0 1 18 -18 h 224 a18 18 0 0 1 18 18 v 8 z" fill="#eef4ff"/>
    <line x1="700" y1="466" x2="960" y2="466" stroke="#3b82f6" stroke-width="1"/>
    <rect x="700" y="440" width="260" height="100" rx="18" ry="18" fill="none" stroke="#3b82f6" stroke-width="2"/>
    <text x="830" y="458" font-size="12" font-weight="700" fill="#1e293b" text-anchor="middle" font-family="'Noto Sans Hebrew',sans-serif">הוחזרה באיחור</text>
    <text x="711" y="486" font-size="10" fill="#334155" font-family="'IBM Plex Mono',monospace">entry / setStatus('RETURNED_LATE');</text>
    <text x="711" y="502" font-size="10" fill="#334155" font-family="'IBM Plex Mono',monospace">        calculateFine();</text>
    <text x="711" y="518" font-size="10" fill="#334155" font-family="'IBM Plex Mono',monospace">        setClosureReason('LATE')</text>
  </g>
  <!-- אבודה (LOST) -->
  <g data-state="lost">
    <title>אבודה, עותק שבאיחור לא הוחזר בתוך תקופת הארכה, והוכרז אבוד, לחץ להסבר</title>
    <rect x="1030" y="440" width="260" height="100" rx="18" ry="18" fill="#ffffff" stroke="none"/>
    <path d="M 1030 466 v -8 a18 18 0 0 1 18 -18 h 224 a18 18 0 0 1 18 18 v 8 z" fill="#eef4ff"/>
    <line x1="1030" y1="466" x2="1290" y2="466" stroke="#3b82f6" stroke-width="1"/>
    <rect x="1030" y="440" width="260" height="100" rx="18" ry="18" fill="none" stroke="#3b82f6" stroke-width="2"/>
    <text x="1160" y="458" font-size="12" font-weight="700" fill="#1e293b" text-anchor="middle" font-family="'Noto Sans Hebrew',sans-serif">אבודה</text>
    <text x="1041" y="486" font-size="10" fill="#334155" font-family="'IBM Plex Mono',monospace">entry / setStatus('LOST');</text>
    <text x="1041" y="502" font-size="10" fill="#334155" font-family="'IBM Plex Mono',monospace">        chargeReplacementFee();</text>
    <text x="1041" y="518" font-size="10" fill="#334155" font-family="'IBM Plex Mono',monospace">        setClosureReason('LOST')</text>
  </g>

  <!-- ==== archive states (row 3) ==== -->
  <!-- ארכיון תפעולי (ARCHIVED_OPS) -->
  <g data-state="archive_ops">
    <title>ארכיון תפעולי, הרשומה קיימת אך אינה מוצגת ברשימות הפעילות, לחץ להסבר</title>
    <rect x="210" y="690" width="250" height="70" rx="18" ry="18" fill="#ffffff" stroke="none"/>
    <path d="M 210 716 v -8 a18 18 0 0 1 18 -18 h 214 a18 18 0 0 1 18 18 v 8 z" fill="#eef4ff"/>
    <line x1="210" y1="716" x2="460" y2="716" stroke="#3b82f6" stroke-width="1"/>
    <rect x="210" y="690" width="250" height="70" rx="18" ry="18" fill="none" stroke="#3b82f6" stroke-width="2"/>
    <text x="335" y="708" font-size="12" font-weight="700" fill="#1e293b" text-anchor="middle" font-family="'Noto Sans Hebrew',sans-serif">ארכיון תפעולי</text>
    <text x="221" y="736" font-size="10" fill="#334155" font-family="'IBM Plex Mono',monospace">entry / setStatus('ARCHIVED_OPS')</text>
  </g>
  <!-- ארכיון פיננסי (ARCHIVED_FIN) -->
  <g data-state="archive_fin">
    <title>ארכיון פיננסי, רשומה שנלווה אליה חיוב כספי ולכן נשמרת שבע שנים, לחץ להסבר</title>
    <rect x="870" y="690" width="250" height="70" rx="18" ry="18" fill="#ffffff" stroke="none"/>
    <path d="M 870 716 v -8 a18 18 0 0 1 18 -18 h 214 a18 18 0 0 1 18 18 v 8 z" fill="#eef4ff"/>
    <line x1="870" y1="716" x2="1120" y2="716" stroke="#3b82f6" stroke-width="1"/>
    <rect x="870" y="690" width="250" height="70" rx="18" ry="18" fill="none" stroke="#3b82f6" stroke-width="2"/>
    <text x="995" y="708" font-size="12" font-weight="700" fill="#1e293b" text-anchor="middle" font-family="'Noto Sans Hebrew',sans-serif">ארכיון פיננסי</text>
    <text x="881" y="736" font-size="10" fill="#334155" font-family="'IBM Plex Mono',monospace">entry / setStatus('ARCHIVED_FIN')</text>
  </g>

  <!-- ============ pseudostates ============ -->
  <g data-state="init">
    <title>מצב התחלתי, נקודת הכניסה למחזור החיים, לחץ להסבר</title>
    <circle cx="70" cy="217.5" r="8" fill="#1e293b"/>
  </g>
  <g data-state="final">
    <title>מצב סיום, רשומת ההשאלה נגרעה מהמערכת ואינה קיימת עוד, לחץ להסבר</title>
    <circle cx="690" cy="880" r="12" fill="none" stroke="#1e293b" stroke-width="2"/>
    <circle cx="690" cy="880" r="7" fill="#1e293b"/>
  </g>

  <!-- ============ transitions ============ -->
  <!-- T1: init -> מוזמנת (UNLABELED, only unlabeled transition) -->
  <path d="M 78 217.5 L 165 217.5" fill="none" stroke="#334155" stroke-width="1.8" marker-end="url(#arrow)"/>
  <!-- T2: מוזמנת -> מושאלת -->
  <path d="M 390 217.5 L 545 217.5" fill="none" stroke="#334155" stroke-width="1.8" marker-end="url(#arrow)"/>
  <!-- T3: מוזמנת -> פקעה (time) -->
  <path d="M 240 270 L 240 380 L 170 380 L 170 440" fill="none" stroke="#334155" stroke-width="1.8" marker-end="url(#arrow)"/>
  <!-- T4: מושאלת self-loop (renewal) -->
  <path d="M 640 165 C 640 108, 715 108, 715 165" fill="none" stroke="#334155" stroke-width="1.8" marker-end="url(#arrow)"/>
  <!-- T5: מושאלת -> הוחזרה בזמן -->
  <path d="M 600 270 L 600 380 L 500 380 L 500 440" fill="none" stroke="#334155" stroke-width="1.8" marker-end="url(#arrow)"/>
  <!-- T6: מושאלת -> באיחור (time) -->
  <path d="M 770 217.5 L 950 217.5" fill="none" stroke="#334155" stroke-width="1.8" marker-end="url(#arrow)"/>
  <!-- T7: באיחור -> הוחזרה באיחור -->
  <path d="M 1000 270 L 1000 380 L 830 380 L 830 440" fill="none" stroke="#334155" stroke-width="1.8" marker-end="url(#arrow)"/>
  <!-- T8: באיחור -> אבודה -->
  <path d="M 1130 270 L 1130 380 L 1160 380 L 1160 440" fill="none" stroke="#334155" stroke-width="1.8" marker-end="url(#arrow)"/>
  <!-- T9: באיחור -> מושאלת BACK-ARC (manager extends) -->
  <path d="M 1062.5 165 L 1062.5 80 L 575 80 L 575 165" fill="none" stroke="#334155" stroke-width="1.8" marker-end="url(#arrow)"/>
  <!-- T10: פקעה -> ארכיון תפעולי (closure, time) -->
  <path d="M 170 540 L 170 655 L 280 655 L 280 690" fill="none" stroke="#334155" stroke-width="1.8" marker-end="url(#arrow)"/>
  <!-- T11: הוחזרה בזמן -> ארכיון תפעולי (closure, time) -->
  <path d="M 500 540 L 500 655 L 390 655 L 390 690" fill="none" stroke="#334155" stroke-width="1.8" marker-end="url(#arrow)"/>
  <!-- T12: הוחזרה באיחור -> ארכיון פיננסי (closure, time) -->
  <path d="M 830 540 L 830 655 L 940 655 L 940 690" fill="none" stroke="#334155" stroke-width="1.8" marker-end="url(#arrow)"/>
  <!-- T13: אבודה -> ארכיון פיננסי (closure, time) -->
  <path d="M 1160 540 L 1160 655 L 1050 655 L 1050 690" fill="none" stroke="#334155" stroke-width="1.8" marker-end="url(#arrow)"/>
  <!-- T14: ארכיון תפעולי -> final (RETENTION, 2y) -->
  <path d="M 335 760 L 335 880 L 666 880" fill="none" stroke="#334155" stroke-width="1.8" marker-end="url(#arrow)"/>
  <!-- T15: ארכיון פיננסי -> final (RETENTION, 7y) -->
  <path d="M 995 760 L 995 880 L 714 880" fill="none" stroke="#334155" stroke-width="1.8" marker-end="url(#arrow)"/>

  <!-- ============ transition labels ============ -->
  <g font-size="10" font-family="'Noto Sans Hebrew','IBM Plex Mono',monospace">
    <!-- T2: מוזמנת -> מושאלת -->
    <text class="tl" x="467" y="204" text-anchor="middle" fill="#334155">השאלה <tspan fill="#0891b2">[ספרן]</tspan></text>
    <text class="tl" x="467" y="217" text-anchor="middle" fill="#15803d">/ checkout()</text>
    <!-- T3: מוזמנת -> פקעה -->
    <text class="tl" x="240" y="313" text-anchor="middle" fill="#334155">חלף מועד האיסוף</text>
    <text class="tl" x="240" y="326" text-anchor="middle" fill="#0891b2">[לא נאסף תוך 3 ימים]</text>
    <text class="tl" x="240" y="339" text-anchor="middle" fill="#15803d">/ releaseToNextInQueue()</text>
    <!-- T4: מושאלת self-loop -->
    <text class="tl" x="677.5" y="98" text-anchor="middle" fill="#334155">חידוש <tspan fill="#0891b2">[renewalsCount &lt; maxRenewals]</tspan></text>
    <text class="tl" x="677.5" y="111" text-anchor="middle" fill="#15803d">/ dueDate += period; renewalsCount++</text>
    <!-- T5: מושאלת -> הוחזרה בזמן -->
    <text class="tl" x="600" y="320" text-anchor="middle" fill="#334155">קליטת החזרה <tspan fill="#0891b2">[ספרן]</tspan></text>
    <text class="tl" x="600" y="333" text-anchor="middle" fill="#15803d">/ setReturnDate(today)</text>
    <!-- T6: מושאלת -> באיחור -->
    <text class="tl" x="860" y="204" text-anchor="middle" fill="#334155">חלף תאריך היעד</text>
    <text class="tl" x="860" y="217" text-anchor="middle" fill="#15803d">/ markOverdue()</text>
    <!-- T7: באיחור -> הוחזרה באיחור -->
    <text class="tl" x="915" y="320" text-anchor="middle" fill="#334155">קליטת החזרה <tspan fill="#0891b2">[ספרן]</tspan></text>
    <text class="tl" x="915" y="333" text-anchor="middle" fill="#15803d">/ calculateFine()</text>
    <!-- T8: באיחור -> אבודה -->
    <text class="tl" x="1195" y="313" text-anchor="middle" fill="#334155">הכרזת אבוד</text>
    <text class="tl" x="1195" y="326" text-anchor="middle" fill="#0891b2">[ספרן, לאחר תקופת ארכה]</text>
    <text class="tl" x="1195" y="339" text-anchor="middle" fill="#15803d">/ chargeReplacementFee()</text>
    <!-- T9: back-arc באיחור -> מושאלת -->
    <text class="tl" x="820" y="72" text-anchor="middle" fill="#334155">הארכת איחור <tspan fill="#0891b2">[מנהל סניף בלבד]</tspan></text>

function xmlEscape(s) {
  return String(s ?? '')
    .replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;')
    .replace(/"/g, '&quot;').replace(/'/g, '&apos;');
}

function downloadFile(filename, mimeType, content) {
  const blob = new Blob([content], { type: mimeType });
  const url = URL.createObjectURL(blob);
  const a = Object.assign(document.createElement('a'), { href: url, download: filename });
  document.body.appendChild(a);
  a.click();
  setTimeout(() => { URL.revokeObjectURL(url); a.remove(); }, 1000);
}

function xmiBody(elements, rels) {
  const lines = [];
  lines.push(`    <packagedElement xmi:type="uml:StateMachine" xmi:id="sm_1" name="${xmlEscape(diagramModel.title)}">`);
  lines.push(`      <region xmi:type="uml:Region" xmi:id="region_1">`);
  const walk = els => {
    for (const el of els) {
      if (el.kind === 'pseudostate')
        lines.push(`        <subvertex xmi:type="uml:Pseudostate" xmi:id="${el.id}" kind="${el.subKind}"/>`);
      if (el.kind === 'state') {
        lines.push(`        <subvertex xmi:type="uml:State" xmi:id="${el.id}" name="${xmlEscape(el.name)}"/>`);
        if (el.subElements && el.subElements.length) walk(el.subElements);
      }
    }
  };
  walk(elements);
  for (const r of rels) {
    if (r.kind === 'transition')
      lines.push(`        <transition xmi:type="uml:Transition" xmi:id="${r.id}" source="${r.from}" target="${r.to}"${r.event ? ` name="${xmlEscape(r.event)}"` : ''}/>`);
  }
  lines.push(`      </region>`);
  lines.push(`    </packagedElement>`);
  return lines.join('\n');
}

function exportXMI() {
  const m = diagramModel;
  const title = xmlEscape(m.title || 'diagram');
  const allElements = m.parts.flatMap(p => p.elements);
  const allRelationships = m.parts.flatMap(p => p.relationships);
  const body = xmiBody(allElements, allRelationships);
  const xmi = `<?xml version="1.0" encoding="UTF-8"?>
<xmi:XMI xmi:version="2.1"
  xmlns:xmi="http://www.omg.org/XMI"
  xmlns:uml="http://www.eclipse.org/uml2/5.0.0/UML">
  <uml:Model xmi:id="model_1" name="${title}">
${body}
  </uml:Model>
</xmi:XMI>`;
  downloadFile((m.title || 'diagram').replace(/\s+/g, '_') + '.xmi', 'application/xml', xmi);
}

function openStateModal(key) {
  const info = STATE_INFO[key];
  if (!info) return;
  document.getElementById('modal-title').textContent = info.title;
  const st = document.getElementById('modal-status');
  st.textContent = info.status ? "entry / setStatus('" + info.status + "')" : '';
  st.style.display = info.status ? 'inline-block' : 'none';
  document.getElementById('modal-body').innerHTML =
    '<h3>מה המצב מכסה</h3><p>' + info.covers + '</p>' +
    '<h3>הלוגיקה</h3><p>' + info.logic + '</p>' +
    '<div class="teach"><h3>נקודת לימוד</h3><p>' + info.teach + '</p></div>';
  document.getElementById('modal-overlay').hidden = false;
}

function closeStateModal() {
  document.getElementById('modal-overlay').hidden = true;
}

addEventListener('load', () => {
  document.querySelectorAll('[data-state]').forEach(g => {
    g.addEventListener('click', e => { e.stopPropagation(); openStateModal(g.dataset.state); });
  });
  document.getElementById('modal-overlay').addEventListener('click', e => {
    if (e.target.id === 'modal-overlay') closeStateModal();
  });
  addEventListener('keydown', e => { if (e.key === 'Escape') closeStateModal(); });
  const hashKey = location.hash.slice(1);
  if (STATE_INFO[hashKey]) openStateModal(hashKey);
});

// white background rects behind every transition label
addEventListener('load', () => {
  document.querySelectorAll('text.tl').forEach(t => {
    const b = t.getBBox();
    const r = document.createElementNS('http://www.w3.org/2000/svg', 'rect');
    r.setAttribute('x', b.x - 3); r.setAttribute('y', b.y - 1);
    r.setAttribute('width', b.width + 6); r.setAttribute('height', b.height + 2);
    r.setAttribute('rx', 3); r.setAttribute('fill', '#ffffff'); r.setAttribute('fill-opacity', '0.92');
    t.parentNode.insertBefore(r, t.parentNode.firstChild);
  });
});
