<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
  <meta charset="UTF-8">
  <title>ספר פתוח, Use Case Diagram</title>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+Hebrew:wght@400;600&family=IBM+Plex+Mono:wght@400;700&display=swap" rel="stylesheet">
  <style>
/* inlined uc-diagram-common.css */
/* uc-diagram-common.css, SAD MCP shared styles for use case diagrams */

/* ── Base layout ─────────────────────────────────────────────────────────── */
body { margin: 0; padding: 20px 0; background: #f8fafc;
  font-family: 'Noto Sans Hebrew', sans-serif; color: #1e293b; }
h1.page-title { text-align: center; font-size: 18px; color: #1e40af;
  margin: 0 0 10px; font-weight: 700; }
.diagram-part { display: flex; justify-content: center; }

/* ── Tab bar ─────────────────────────────────────────────────────────────── */
.tab-bar { display: flex; justify-content: center; gap: 8px; margin: 12px 0 4px; }
.tab { padding: 7px 20px; border: 1px solid #cbd5e1; background: #f8fafc;
  color: #475569; font-size: 13px; font-weight: 600; cursor: pointer;
  border-radius: 6px; font-family: 'Noto Sans Hebrew', sans-serif; }
.tab.active { background: #1e40af; color: #fff; border-color: #1e40af; }
.split-rationale { text-align: center; font-size: 11px; color: #64748b;
  margin: 0 0 8px; font-style: italic; }

/* ── Buttons ─────────────────────────────────────────────────────────────── */
.fix-btn { padding: 8px 20px; border: 1px solid #3b82f6; background: #eff6ff;
  color: #1e40af; font-size: 12px; font-weight: 600; cursor: pointer;
  border-radius: 6px; font-family: 'Noto Sans Hebrew', sans-serif; }
.fix-btn:hover { background: #dbeafe; }
.vp-export-btn { position: fixed; bottom: 20px; right: 20px; z-index: 1000;
  background: #1e40af; color: #fff; border: none; border-radius: 6px;
  padding: 8px 16px; font-size: 13px; cursor: pointer;
  font-family: 'IBM Plex Mono', monospace; }
.vp-export-btn:hover { background: #1e3a8a; }

/* ── Assumptions panel ───────────────────────────────────────────────────── */
.assumptions-panel { display: flex; gap: 24px; max-width: 1000px;
  margin: 20px auto; padding: 16px 20px; background: #fff;
  border: 1px solid #cbd5e1; border-radius: 8px; direction: rtl; }
.assumptions-col { flex: 1; min-width: 0; }
.assumptions-col h3 { margin: 0 0 6px; font-size: 13px; font-weight: 600; color: #1e40af; }
.assumptions-col ul { margin: 0; padding-right: 18px; }
.assumptions-col li { color: #334155; font-size: 12px; line-height: 1.6; }

/* ── User stories summary panel ──────────────────────────────────────────── */
.user-stories-panel { max-width: 1000px; margin: 12px auto 20px; padding: 16px 20px;
  background: #fff; border: 1px solid #cbd5e1; border-radius: 8px; direction: rtl; }
.user-stories-panel h3 { margin: 0 0 8px; font-size: 13px; font-weight: 600; color: #1e40af; }
.user-stories-panel ul { margin: 0; padding-right: 18px; }
.user-stories-panel li { color: #334155; font-size: 12px; line-height: 1.7; }

/* ── UC modal ────────────────────────────────────────────────────────────── */
body.uc-modal-open { overflow: hidden; }
.uc-modal[hidden] { display: none !important; }
.uc-modal { position: fixed; inset: 0; z-index: 2000; display: flex;
  align-items: flex-start; justify-content: center; padding: 40px 20px;
  overflow-y: auto; direction: rtl; font-family: 'Noto Sans Hebrew', sans-serif; }
.uc-modal-backdrop { position: absolute; inset: 0; background: rgba(15,23,42,0.55); }
.uc-modal-body { position: relative; z-index: 1; width: 100%; max-width: 960px;
  background: #fff; border-radius: 12px; box-shadow: 0 10px 40px rgba(0,0,0,.25);
  padding: 28px 32px 32px; color: #1e293b; }
.uc-modal-close { position: absolute; top: 10px; left: 14px; background: none;
  border: none; font-size: 24px; color: #64748b; cursor: pointer; }
.uc-modal-body header { border-bottom: 1px solid #e2e8f0; padding-bottom: 12px;
  margin-bottom: 18px; }
.uc-modal-body .uc-id { display: inline-block; font-family: 'IBM Plex Mono',monospace;
  font-size: 11px; color: #64748b; background: #f1f5f9; padding: 2px 8px;
  border-radius: 4px; margin-bottom: 6px; }
.uc-modal-body .uc-name { margin: 0 0 4px; font-size: 20px; color: #1e40af; font-weight: 700; }
.uc-modal-body .uc-primary { font-size: 13px; color: #334155; }
.uc-modal-body .uc-primary-label { color: #64748b; margin-left: 6px; }
.uc-modal-body .uc-primary-link { color: #1e40af; cursor: pointer; font-weight: 600;
  text-decoration: underline dotted; }
.uc-description { margin-bottom: 20px; font-size: 14px; line-height: 1.7; color: #334155; }
.uc-scenarios h3 { font-size: 14px; color: #1e40af; margin: 18px 0 6px;
  border-right: 3px solid #3b82f6; padding-right: 10px; }
.uc-scenarios ol { margin: 0 0 14px; padding-right: 22px; }
.uc-scenarios ol li { color: #1e293b; font-size: 13px; line-height: 1.9; }
.step-actor { color: #1e40af; font-weight: 600; cursor: pointer; text-decoration: underline dotted; }
.step-system { color: #475569; font-style: italic; }
.step-include { color: #7c3aed; font-family: 'IBM Plex Mono', monospace; font-size: 11px; }
.step-uc-ref { color: #7c3aed; cursor: pointer; text-decoration: underline; }
.ext-inline, .ext-sub { list-style: none; color: #64748b; font-size: 12px;
  padding-right: 24px; line-height: 1.7; }
.uc-prepostuser { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 18px;
  margin: 18px 0 20px; }
.uc-prepostuser > div { background: #f8fafc; border: 1px solid #e2e8f0;
  border-radius: 8px; padding: 12px 14px; }
.uc-prepostuser h4 { margin: 0 0 6px; font-size: 12px; color: #1e40af; font-weight: 600; }
.uc-prepostuser ul { margin: 0; padding-right: 18px; font-size: 12px;
  color: #334155; line-height: 1.7; }
.uc-wireframe { border-top: 1px dashed #cbd5e1; padding-top: 16px; margin-top: 6px; }
.uc-wireframe:empty, .uc-wireframe[hidden] { display: none; }

/* ── Actor pulse ─────────────────────────────────────────────────────────── */
.actor-pulse { animation: actor-pulse 0.6s ease-in-out 3; }
@keyframes actor-pulse {
  0%, 100% { filter: none; }
  50%      { filter: drop-shadow(0 0 8px #3b82f6); }
}

/* ── Wireframe scoped theme (wf-*) ───────────────────────────────────────── */
.wf-screen { background: #f8fafc; border: 1px solid #cbd5e1; border-radius: 8px;
  padding: 18px 20px; font-family: 'Noto Sans Hebrew', sans-serif;
  color: #1e293b; direction: rtl; max-width: 760px; margin: 0 auto; }
.wf-heading { margin: 0 0 14px; font-size: 15px; color: #1e40af; font-weight: 700;
  border-bottom: 1px solid #e2e8f0; padding-bottom: 6px; }
.wf-section { margin: 14px 0; }
.wf-row { display: flex; gap: 10px; align-items: center; margin: 6px 0; }
.wf-label { font-size: 12px; color: #475569; min-width: 120px; }
.wf-input, .wf-textarea, .wf-select { flex: 1; background: #fff;
  border: 1px solid #cbd5e1; border-radius: 4px; padding: 6px 8px;
  font-size: 12px; color: #334155; }
.wf-textarea { min-height: 60px; }
.wf-table { width: 100%; border-collapse: collapse; margin: 10px 0; font-size: 12px; }
.wf-table th, .wf-table td { border: 1px solid #cbd5e1; padding: 6px 8px; text-align: right; }
.wf-table th { background: #e2e8f0; color: #1e40af; font-weight: 600; }
.wf-actions { display: flex; gap: 8px; margin-top: 12px; justify-content: flex-start; }
.wf-button { background: #fff; border: 1px solid #64748b; border-radius: 4px;
  padding: 6px 14px; font-size: 12px; color: #334155; cursor: default; }
.wf-primary { background: #1e40af; color: #fff; border-color: #1e40af; }
.wf-image-box { border: 1px dashed #94a3b8; background: #f1f5f9; color: #64748b;
  text-align: center; padding: 24px; border-radius: 4px; font-size: 12px; margin: 10px 0; }
.wf-hint { font-size: 11px; color: #64748b; font-style: italic; margin: 6px 0; }
.wf-badge { display: inline-block; background: #e0f2fe; color: #0369a1;
  padding: 2px 8px; border-radius: 999px; font-size: 10px; font-weight: 600; }

</style>
  <!-- REQUIRED: uc-diagram-common.css sets display:flex on .diagram-part, which overrides
       the browser's [hidden]{display:none}. This one-liner restores correct tab switching. -->
  <style>[hidden] { display: none !important; }</style>
</head>

  <script>
/* inlined uc-diagram-common.js */
/* uc-diagram-common.js, SAD MCP shared runtime for use case diagrams
   Depends on globals defined in the inline <script> of each diagram:
   diagramLayouts, actorDescriptions, assocDescriptions, useCaseDocs, diagramModel

   This file is deployed by hand to themathbible.com (see CLAUDE.md, Static Assets).
   Keep UC_RUNTIME_VERSION in sync with package.json on every deploy, it prints to the
   browser console so you can confirm which runtime is actually live vs. the repo.
*/
const UC_RUNTIME_VERSION = '2.3.2';
if (typeof console !== 'undefined') console.info('[sad-mcp] uc-diagram runtime v' + UC_RUNTIME_VERSION);

// ── fixLayout constants ───────────────────────────────────────────────────
const HEADER_H  = 44;
const UC_PAD    = 30;
const UC_GAP    = 14;
const ACTOR_PAD = 80;

// ── fixLayout ─────────────────────────────────────────────────────────────
function fixLayout(layout) {
  const svg = document.getElementById(layout.svgId);
  if (!svg) return;
  const b = layout.boundary;

  // Step 1, Group UCs by the side of their owning actor.
  const ucSide = {};
  layout.actors.forEach(a =>
    a.ucIds.forEach(uid => {
      ucSide[uid] = ucSide[uid] && ucSide[uid] !== a.side ? 'center' : a.side;
    })
  );
  const cols = { left: [], right: [], center: [] };
  layout.useCases.forEach(uc => cols[ucSide[uc.id] || 'center'].push(uc));

  // Step 2, Sort each column by actor order (top-to-bottom on that side).
  function sortCol(ucs, side) {
    const ordered = layout.actors.filter(a => a.side === side).sort((a, bb) => a.y - bb.y);
    ucs.sort((a, bb) => {
      const ai = ordered.findIndex(act => act.ucIds.includes(a.id));
      const bi = ordered.findIndex(act => act.ucIds.includes(bb.id));
      return (ai < 0 ? 999 : ai) - (bi < 0 ? 999 : bi);
    });
  }
  sortCol(cols.left,  'left');
  sortCol(cols.right, 'right');

  // Step 3, Adaptive column X positions. Widen boundary if needed.
  const COL_GAP = 30;
  const maxRx = ucs => (ucs.length ? Math.max(...ucs.map(u => u.rx)) : 0);
  const lRx = maxRx(cols.left), cRx = maxRx(cols.center), rRx = maxRx(cols.right);
  const gaps = (cRx ? 2 * COL_GAP : (lRx && rRx ? 2 * COL_GAP : 0));
  const needed = 2 * UC_PAD + 2 * lRx + 2 * cRx + 2 * rRx + gaps;
  if (b.width < needed) b.width = needed;

  const leftX   = b.x + UC_PAD + lRx;
  const rightX  = b.x + b.width - UC_PAD - rRx;
  const centerX = (leftX + rightX) / 2;

  function place(ucs, colX, colName) {
    ucs.forEach((uc, i) => {
      uc.cy = b.y + HEADER_H + UC_PAD + uc.ry + i * (uc.ry * 2 + UC_GAP);
      uc.cx = colX;
      uc.col = colName;
    });
  }
  place(cols.left,   leftX,   'left');
  place(cols.right,  rightX,  'right');
  place(cols.center, centerX, 'center');

  // Step 4, Clamp and resolve overlaps. Idempotent fixed-point loop.
  const minX = b.x + UC_PAD;
  const maxX = b.x + b.width - UC_PAD;
  const minY = b.y + HEADER_H + UC_PAD;
  let changed = true, iter = 0;
  while (changed && iter++ < 40) {
    changed = false;
    for (const uc of layout.useCases) {
      const nx = Math.max(minX + uc.rx, Math.min(maxX - uc.rx, uc.cx));
      if (nx !== uc.cx) { uc.cx = nx; changed = true; }
      const ny = Math.max(minY + uc.ry, uc.cy);
      if (ny !== uc.cy) { uc.cy = ny; changed = true; }
    }
    for (const col of Object.values(cols)) {
      col.sort((a, bb) => a.cy - bb.cy);
      for (let i = 1; i < col.length; i++) {
        const prev = col[i - 1], cur = col[i];
        const nd = prev.cy + prev.ry + UC_GAP + cur.ry;
        if (cur.cy < nd) { cur.cy = nd; changed = true; }
      }
    }
  }

  // Step 5, Expand boundary height to fit all UCs.
  const maxBottom = Math.max(...layout.useCases.map(uc => uc.cy + uc.ry));
  b.height = Math.max(b.height, maxBottom - b.y + UC_PAD);

  // Step 6, Re-center actors on their UC group; push bottom actors below boundary.
  layout.actors.forEach(actor => {
    const myUCs = layout.useCases.filter(u => actor.ucIds.includes(u.id));
    if (actor.side === 'left' || actor.side === 'right') {
      if (myUCs.length) actor.y = myUCs.reduce((s, u) => s + u.cy, 0) / myUCs.length;
      actor.x = actor.side === 'left' ? b.x - ACTOR_PAD : b.x + b.width + ACTOR_PAD;
    } else if (actor.side === 'bottom') {
      actor.y = b.y + b.height + ACTOR_PAD;
    }
  });

  // Step 6b, Enforce a minimum vertical gap between actors on the same side.
  // Step 6 centers each actor on its UCs' mean cy, which can place two single-UC
  // actors barely one row apart (~UC_GAP) so their stick figures + labels overlap.
  // Push later actors down to keep centers at least ACTOR_MIN_GAP apart (CR #6).
  const ACTOR_MIN_GAP = 150;
  ['left', 'right'].forEach(side => {
    const col = layout.actors.filter(a => a.side === side).sort((a, bb) => a.y - bb.y);
    for (let i = 1; i < col.length; i++) {
      const need = col[i - 1].y + ACTOR_MIN_GAP;
      if (col[i].y < need) col[i].y = need;
    }
  });

  // Step 7, Write UC positions to the SVG (absolute attributes).
  layout.useCases.forEach(uc => {
    const g = svg.querySelector('[id="uc-group-' + uc.id + '"]');
    if (!g) return;
    const el = g.querySelector('ellipse');
    if (!el) return;
    const dx = uc.cx - parseFloat(el.getAttribute('cx'));
    const dy = uc.cy - parseFloat(el.getAttribute('cy'));
    el.setAttribute('cx', uc.cx);
    el.setAttribute('cy', uc.cy);
    g.querySelectorAll('text').forEach(t => {
      t.setAttribute('x', parseFloat(t.getAttribute('x') || 0) + dx);
      t.setAttribute('y', parseFloat(t.getAttribute('y') || 0) + dy);
    });
    g.removeAttribute('transform');
  });
  layout.actors.forEach(actor => {
    // Scope to THIS svg: a shared actor id (e.g. 'head') repeats across tabs, so
    // document.getElementById returns the first tab's figure and moves the wrong
    // one, leaving this tab's figure detached from its (correctly placed) line.
    const g = svg.querySelector('[id="actor-group-' + actor.id + '"]');
    if (g) g.setAttribute('transform', `translate(${actor.x},${actor.y})`);
  });

  // Step 8, Recalculate every connection line endpoint.
  svg.querySelectorAll('[data-conn-from][data-conn-to]').forEach(line => {
    const fId = line.getAttribute('data-conn-from');
    const tId = line.getAttribute('data-conn-to');
    const fUC = layout.useCases.find(u => u.id === fId);
    const fAc = layout.actors.find(a => a.id === fId);
    const tUC = layout.useCases.find(u => u.id === tId);
    const tAc = layout.actors.find(a => a.id === tId);
    const from = fAc ? { x: fAc.x, y: fAc.y } : fUC ? { x: fUC.cx, y: fUC.cy } : null;
    const to   = tAc ? { x: tAc.x, y: tAc.y } : tUC ? { x: tUC.cx, y: tUC.cy } : null;
    if (!from || !to) return;
    let x1 = from.x, y1 = from.y, x2 = to.x, y2 = to.y;
    if (fUC) { const a = Math.atan2(to.y - fUC.cy, to.x - fUC.cx);     x1 = fUC.cx + fUC.rx * Math.cos(a); y1 = fUC.cy + fUC.ry * Math.sin(a); }
    if (tUC) { const a = Math.atan2(from.y - tUC.cy, from.x - tUC.cx); x2 = tUC.cx + tUC.rx * Math.cos(a); y2 = tUC.cy + tUC.ry * Math.sin(a); }
    line.setAttribute('x1', x1); line.setAttribute('y1', y1);
    line.setAttribute('x2', x2); line.setAttribute('y2', y2);

    const hitbox = svg.querySelector(
      `.conn-hitbox[data-hitbox-from="${fId}"][data-hitbox-to="${tId}"]`);
    if (hitbox) {
      hitbox.setAttribute('x1', x1); hitbox.setAttribute('y1', y1);
      hitbox.setAttribute('x2', x2); hitbox.setAttribute('y2', y2);
    }

    // Reposition «include»/«extend» text label associated with this line.
    const lbl = svg.querySelector(`[data-label-for="${fId} ${tId}"]`);
    if (lbl) {
      lbl.setAttribute('x', (x1 + x2) / 2);
      lbl.setAttribute('y', (y1 + y2) / 2 - 8);
    }
  });

  // Step 9, Resize boundary rect and SVG viewBox (both width and height).
  const br = svg.querySelector('.system-boundary, rect[rx="12"]');
  if (br) { br.setAttribute('width', b.width); br.setAttribute('height', b.height); }
  const vb = svg.getAttribute('viewBox');
  if (vb) {
    const p = vb.split(/\s+/);
    p[3] = Math.max(parseFloat(p[3]), b.y + b.height + 120);
    const ACTOR_LABEL_MARGIN = 120;
    const maxActorX = layout.actors.length
      ? Math.max(...layout.actors.map(a => a.x))
      : b.x + b.width;
    p[2] = Math.max(parseFloat(p[2]), maxActorX + ACTOR_LABEL_MARGIN);
    svg.setAttribute('viewBox', p.join(' '));
  }

  // Step 10, Timing labels.
  renderTimingLabels(layout);
}

// ── renderTimingLabels ────────────────────────────────────────────────────
function renderTimingLabels(layout) {
  const svg = document.getElementById(layout.svgId);
  if (!svg) return;
  svg.querySelectorAll('.timing-label').forEach(el => el.remove());
  const NS = 'http://www.w3.org/2000/svg';
  (layout.connections || []).forEach(conn => {
    if (!conn.timing) return;
    const line = svg.querySelector(
      `[data-conn-from="${conn.from}"][data-conn-to="${conn.to}"]`);
    if (!line) return;
    const x1 = +line.getAttribute('x1'), y1 = +line.getAttribute('y1');
    const x2 = +line.getAttribute('x2'), y2 = +line.getAttribute('y2');
    const mx = (x1 + x2) / 2, my = (y1 + y2) / 2;
    const w = 10 + conn.timing.length * 7, h = 16;
    const g = document.createElementNS(NS, 'g');
    g.setAttribute('class', 'timing-label');
    const rect = document.createElementNS(NS, 'rect');
    rect.setAttribute('x', mx - w / 2); rect.setAttribute('y', my - h / 2);
    rect.setAttribute('width', w);      rect.setAttribute('height', h);
    rect.setAttribute('fill', 'white'); rect.setAttribute('stroke', '#334155');
    rect.setAttribute('stroke-width', '0.8'); rect.setAttribute('rx', '3');
    const text = document.createElementNS(NS, 'text');
    text.setAttribute('x', mx); text.setAttribute('y', my + 4);
    text.setAttribute('font-size', '10'); text.setAttribute('text-anchor', 'middle');
    text.setAttribute('fill', '#334155');
    text.setAttribute('font-family', "'Noto Sans Hebrew', sans-serif");
    text.setAttribute('direction', 'rtl');
    text.textContent = conn.timing;
    g.appendChild(rect); g.appendChild(text);
    svg.appendChild(g);
  });
}

// ── Tabs ──────────────────────────────────────────────────────────────────
let activeTab = 0;
function currentLayout() { return diagramLayouts[activeTab]; }
function showDiagram(index) {
  activeTab = index;
  document.querySelectorAll('.diagram-part').forEach((p, i) => p.hidden = i !== index);
  document.querySelectorAll('.tab').forEach((t, i) => t.classList.toggle('active', i === index));
  fixLayout(diagramLayouts[index]);

// ── Small popup (actors & associations) ───────────────────────────────────
function showDesc(id, type, event) {
  if (type === 'uc') { openUcModal(id); event.stopPropagation(); return; }
  showPopup(id, type, event);
}

function showPopup(id, type, event) {
  hideDesc();
  const data = type === 'actor' ? actorDescriptions[id]
             : type === 'assoc' ? assocDescriptions[id]
             : null;
  if (!data) return;
  const panel = document.createElement('div');
  panel.id = 'desc-panel';
  panel.innerHTML = `
    <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:6px;">
      <strong style="font-size:12px;color:#1e40af;direction:rtl;">${data.name}</strong>
      <span onclick="hideDesc()" style="cursor:pointer;color:#94a3b8;font-size:18px;line-height:1;margin-right:6px;">×</span>
    </div>
    <div style="font-size:11px;color:#334155;line-height:1.6;direction:rtl;">${data.desc}</div>`;
  Object.assign(panel.style, {
    position:'fixed', background:'#fff', border:'1.5px solid #2980b9',
    borderRadius:'8px', padding:'12px 16px', maxWidth:'300px',
    boxShadow:'0 4px 14px rgba(0,0,0,.15)', zIndex:'1000',
    left: event.clientX + 'px', top: event.clientY + 'px'
  });
  document.body.appendChild(panel);
  const r = panel.getBoundingClientRect();
  if (r.right  > window.innerWidth)  panel.style.left = (window.innerWidth  - r.width  - 10) + 'px';
  if (r.bottom > window.innerHeight) panel.style.top  = (event.clientY - r.height - 10) + 'px';
  event.stopPropagation();
}

function hideDesc() { document.getElementById('desc-panel')?.remove(); }

document.addEventListener('click', e => {
  if (!e.target.closest('[data-uc-id]') &&
      !e.target.closest('[data-actor-id]') &&
      !e.target.closest('[data-conn-id]')) hideDesc();
});

// ── UC modal ──────────────────────────────────────────────────────────────
function wireframeSafe(html) {
  const forbidden = [/<script\b/i, /\son\w+\s*=/i, /<iframe\b/i,
    /src\s*=\s*["']https?:/i, /href\s*=\s*["']https?:/i, /@import\b/i, /<style\b/i];
  return !forbidden.some(rx => rx.test(html));
}

function openUcModal(id) {
  const doc = useCaseDocs[id];
  if (!doc) return;
  const actorName = aid => (actorDescriptions[aid]?.name) || aid;
  const ucName    = uid => (useCaseDocs[uid]?.name) || uid;
  const esc = s => String(s || '').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');

  let scenariosHtml = '';
  (doc.scenarios || []).forEach(sce => {
    scenariosHtml += `<h3>${esc(sce.name || sce.id)}</h3><ol>`;
    (sce.flow || []).forEach((step, i) => {
      if (step.kind === 'actor') {
        scenariosHtml += `<li><strong class="step-actor" data-actor-id="${esc(step.actor)}">${esc(actorName(step.actor))}</strong>: ${esc(step.text || '')}</li>`;
      } else if (step.kind === 'system') {
        scenariosHtml += `<li><em class="step-system">המערכת</em>: ${esc(step.text || '')}</li>`;
      } else if (step.kind === 'include') {
        scenariosHtml += `<li><span class="step-include">«include» </span><a class="step-uc-ref" data-uc-ref="${esc(step.uc)}">${esc(ucName(step.uc))}</a>${step.text ? ', ' + esc(step.text) : ''}</li>`;
      } else if (step.kind === 'extension') {
        scenariosHtml += `<li class="ext-inline">${step.at ? esc(String(step.at)) + 'a. ' : ''}${esc(step.text || '')}</li>`;
      }
      (sce.extensions || []).filter(e => e.at === i + 1).forEach((ext, j) => {
        scenariosHtml += `<li class="ext-sub">${i + 1}${String.fromCharCode(97 + j)}. ${esc(ext.text)}</li>`;
      });
    });
    scenariosHtml += '</ol>';
  });

  const listItems = items => (items || []).map(s => `<li>${esc(s)}</li>`).join('');
  const usItems   = (doc.userStories || []).map(us =>
    `<li>${esc('בתור ' + us.role + ', אני רוצה ' + us.want + ', כדי ש' + us.so)}</li>`).join('');

  const wfHtml = (doc.wireframe && wireframeSafe(doc.wireframe))
    ? `<section class="uc-wireframe">${doc.wireframe}</section>` : '';
  if (doc.wireframe && !wireframeSafe(doc.wireframe))
    console.warn(`Wireframe for ${id} failed safety check.`);

  // Single innerHTML write, avoids silent failures in sandboxed iframe environments.
  const body = document.querySelector('#uc-modal .uc-modal-body');
  body.innerHTML = `
    <button class="uc-modal-close" onclick="closeUcModal()" aria-label="Close">×</button>
    <header>
      <span class="uc-id">${esc(doc.id)}</span>
      <h2 class="uc-name">${esc(doc.name)}</h2>
      <div class="uc-primary">
        <span class="uc-primary-label">שחקן ראשי:</span>
        <a class="uc-primary-link" data-actor-pulse="${esc(doc.primaryActor)}">${esc(actorName(doc.primaryActor))}</a>
      </div>
    </header>
    <section class="uc-description">${esc(doc.description || '')}</section>
    <section class="uc-scenarios">${scenariosHtml}</section>
    <section class="uc-prepostuser">
      <div class="uc-pre"><h4>תנאים מוקדמים</h4><ul>${listItems(doc.preconditions)}</ul></div>
      <div class="uc-post"><h4>תנאים סופיים</h4><ul>${listItems(doc.postconditions)}</ul></div>
      <div class="uc-stories"><h4>סיפורי משתמש</h4><ul>${usItems}</ul></div>
    </section>
    ${wfHtml}`;

  body.querySelector('.uc-primary-link').onclick = () => { closeUcModal(); pulseActor(doc.primaryActor); };
  body.querySelectorAll('.step-actor').forEach(el => {
    el.onclick = () => { closeUcModal(); pulseActor(el.dataset.actorId); };
  });
  body.querySelectorAll('.step-uc-ref').forEach(el => {
    el.onclick = () => openUcModal(el.dataset.ucRef);
  });

  const modal = document.getElementById('uc-modal');
  modal.hidden = false;
  document.body.classList.add('uc-modal-open');
}

function closeUcModal() {
  const modal = document.getElementById('uc-modal');
  if (modal) modal.hidden = true;
  document.body.classList.remove('uc-modal-open');
}

document.addEventListener('keydown', e => { if (e.key === 'Escape') closeUcModal(); });

function pulseActor(actorId) {
  const g = document.getElementById('actor-group-' + actorId);
  if (!g) return;
  g.classList.add('actor-pulse');
  setTimeout(() => g.classList.remove('actor-pulse'), 2000);
}

// ── Assumptions panel ─────────────────────────────────────────────────────
function renderAssumptions() {
  const a = (diagramModel && diagramModel.assumptions)   || [];
  const q = (diagramModel && diagramModel.openQuestions) || [];
  const panel = document.getElementById('assumptions-panel');
  if (!panel) return;
  if (!a.length && !q.length) { panel.hidden = true; return; }
  panel.hidden = false;
  const fillList = (listEl, items) => {
    listEl.innerHTML = '';
    items.forEach(s => { const li = document.createElement('li'); li.textContent = s; listEl.appendChild(li); });
  };
  fillList(document.getElementById('assumptions-list'),    a);
  fillList(document.getElementById('open-questions-list'), q);
  document.getElementById('assumptions-col').hidden    = !a.length;
  document.getElementById('open-questions-col').hidden = !q.length;
}

// ── XMI export ────────────────────────────────────────────────────────────
function xmlEscape(s) {
  return String(s == null ? '' : s)
    .replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;')
    .replace(/"/g,'&quot;').replace(/'/g,'&apos;');
}

function downloadFile(filename, mimeType, content) {
  const blob = new Blob([content], { type: mimeType });
  const url  = URL.createObjectURL(blob);
  const a = Object.assign(document.createElement('a'), { href: url, download: filename });
  document.body.appendChild(a); a.click();
  setTimeout(() => { URL.revokeObjectURL(url); a.remove(); }, 1000);
}

function xmiBody(elements, rels) {
  const lines = [];
  function flowText(uc) {
    const actorName = id => (elements.find(e => e.kind === 'actor'   && e.id === id) || {}).name || id;
    const ucName    = id => (elements.find(e => e.kind === 'useCase' && e.id === id) || {}).name || id;
    const out = [];
    (uc.scenarios || []).forEach(sc => {
      out.push((sc.name || sc.id) + ':');
      (sc.flow || []).forEach((step, i) => {
        const n = i + 1;
        if      (step.kind === 'actor')     out.push('  ' + n + '. ' + actorName(step.actor) + ': ' + step.text);
        else if (step.kind === 'system')    out.push('  ' + n + '. System: ' + step.text);
        else if (step.kind === 'include')   out.push('  ' + n + '. «include» ' + ucName(step.uc) + (step.text ? ', ' + step.text : ''));
        else if (step.kind === 'extension') out.push('  ' + n + 'a. ' + step.text);
        (sc.extensions || []).filter(e => e.at === n).forEach((e, j) => {
          out.push('  ' + n + String.fromCharCode(97 + j) + '. ' + e.text);
        });
      });
    });
    return out.join('\n');
  }

  for (const el of elements) {
    if (el.kind === 'useCase') {
      const hasDocs = (el.preconditions  && el.preconditions.length)
                   || (el.postconditions && el.postconditions.length)
                   || (el.scenarios      && el.scenarios.length);
      if (!hasDocs) {
        lines.push('    <packagedElement xmi:type="uml:UseCase" xmi:id="' + el.id + '" name="' + xmlEscape(el.name) + '"/>');
      } else {
        lines.push('    <packagedElement xmi:type="uml:UseCase" xmi:id="' + el.id + '" name="' + xmlEscape(el.name) + '">');
        (el.preconditions || []).forEach((p, i) => {
          lines.push('      <precondition xmi:type="uml:Constraint" xmi:id="' + el.id + '-pre-' + (i+1) + '" name="pre-' + (i+1) + '">');
          lines.push('        <specification xmi:type="uml:OpaqueExpression" xmi:id="' + el.id + '-pre-' + (i+1) + '-s"><body>' + xmlEscape(p) + '</body></specification>');
          lines.push('      </precondition>');
        });
        (el.postconditions || []).forEach((p, i) => {
          lines.push('      <postcondition xmi:type="uml:Constraint" xmi:id="' + el.id + '-post-' + (i+1) + '" name="post-' + (i+1) + '">');
          lines.push('        <specification xmi:type="uml:OpaqueExpression" xmi:id="' + el.id + '-post-' + (i+1) + '-s"><body>' + xmlEscape(p) + '</body></specification>');
          lines.push('      </postcondition>');
        });
        if (el.scenarios && el.scenarios.length) {
          lines.push('      <ownedBehavior xmi:type="uml:OpaqueBehavior" xmi:id="' + el.id + '-flow" name="Flow of Events">');
          lines.push('        <body>' + xmlEscape(flowText(el)) + '</body>');
          lines.push('      </ownedBehavior>');
        }
        lines.push('    </packagedElement>');
      }
    }
    if (el.kind === 'actor')
      lines.push('    <packagedElement xmi:type="uml:Actor" xmi:id="' + el.id + '" name="' + xmlEscape(el.name) + '"/>');
  }
  for (const r of rels) {
    if (r.kind === 'actorAssoc') {
      lines.push('    <packagedElement xmi:type="uml:Association" xmi:id="' + r.id + '">');
      lines.push('      <ownedEnd xmi:type="uml:Property" xmi:id="' + r.id + '-e1" association="' + r.id + '" type="' + r.actorId + '"/>');
      lines.push('      <ownedEnd xmi:type="uml:Property" xmi:id="' + r.id + '-e2" association="' + r.id + '" type="' + r.ucId   + '"/>');
      lines.push('    </packagedElement>');
    }
    if (r.kind === 'include')
      lines.push('    <packagedElement xmi:type="uml:Include" xmi:id="' + r.id + '" includingCase="' + r.from + '" addition="' + r.to + '"/>');
    if (r.kind === 'extend')
      lines.push('    <packagedElement xmi:type="uml:Extend"  xmi:id="' + r.id + '" extendedCase="'  + r.to   + '" extension="' + r.from + '"/>');
    if (r.kind === 'generalization')
      lines.push('    <packagedElement xmi:type="uml:Generalization" xmi:id="' + r.id + '" specific="' + r.from + '" general="' + r.to + '"/>');
  }
  return lines.join('\n');
}

function exportXMI() {
  const m     = diagramModel;
  const title = xmlEscape(m.title || 'diagram');
  const body  = xmiBody(m.parts.flatMap(p => p.elements), m.parts.flatMap(p => p.relationships));
  const xmi   =
    '<?xml version="1.0" encoding="UTF-8"?>\n' +
    '<xmi:XMI xmi:version="2.1"\n' +
    '  xmlns:xmi="http://www.omg.org/XMI"\n' +
    '  xmlns:uml="http://www.eclipse.org/uml2/5.0.0/UML">\n' +
    '  <uml:Model xmi:id="model_1" name="' + title + '">\n' +
    body + '\n' +
    '  </uml:Model>\n' +
    '</xmi:XMI>';
  downloadFile(title.replace(/\s+/g, '_') + '.xmi', 'application/xml', xmi);
}

// ── User stories summary panel ────────────────────────────────────────────
function renderUserStoriesSummary() {
  const panel = document.getElementById('user-stories-panel');
  if (!panel) return;
  const seen = new Set();
  const stories = [];
  Object.values(useCaseDocs).forEach(doc => {
    (doc.userStories || []).forEach(us => {
      const key = us.role + '|' + us.want + '|' + us.so;
      if (!seen.has(key)) { seen.add(key); stories.push(us); }
    });
  });
  if (!stories.length) { panel.hidden = true; return; }
  panel.hidden = false;
  const list = document.getElementById('user-stories-list');
  if (!list) return;
  list.innerHTML = '';
  stories.forEach(us => {
    const li = document.createElement('li');
    li.textContent = 'בתור ' + us.role + ', אני רוצה ' + us.want + ', כדי ש' + us.so;
    list.appendChild(li);
  });
}

// ── Init ──────────────────────────────────────────────────────────────────
document.addEventListener('DOMContentLoaded', () => {
  diagramLayouts.forEach(l => fixLayout(l));
  renderAssumptions();
  renderUserStoriesSummary();
});
